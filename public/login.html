<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Costax — Вход</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/icon-180.png">
    <link rel="manifest" href="/manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', -apple-system, sans-serif; background: #F7F9F9; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
.card { background: white; border: 1px solid #EFF3F4; border-radius: 16px; width: 100%; max-width: 380px; padding: 32px 28px 28px; box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
.logo { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }
.logo-icon { width: 32px; height: 32px; background: #1D9BF0; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.logo-text { font-size: 18px; font-weight: 800; color: #0F1419; letter-spacing: -0.02em; }
.tabs { display: flex; border-bottom: 1px solid #EFF3F4; margin-bottom: 22px; }
.tab { flex: 1; text-align: center; padding: 10px; font-size: 14px; font-weight: 700; color: #536471; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; user-select: none; }
.tab.active { color: #0F1419; border-bottom-color: #1D9BF0; }
h2 { font-size: 20px; font-weight: 800; color: #0F1419; margin-bottom: 4px; letter-spacing: -0.02em; }
.sub { font-size: 13px; color: #536471; margin-bottom: 20px; line-height: 1.5; }
.label { font-size: 13px; font-weight: 700; color: #536471; margin-bottom: 5px; display: block; }
.inp { width: 100%; border: 1px solid #CFD9DE; border-radius: 8px; padding: 11px 13px; font-size: 15px; color: #0F1419; outline: none; font-family: inherit; transition: border-color 0.15s; margin-bottom: 14px; }
.inp:focus { border-color: #1D9BF0; }
.inp::placeholder { color: #9AA5B0; }
.btn-main { width: 100%; background: #0F1419; color: white; border: none; border-radius: 9999px; padding: 13px; font-size: 15px; font-weight: 800; cursor: pointer; font-family: inherit; transition: background 0.15s; }
.btn-main:hover { background: #272C30; }
.btn-main:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-blue { background: #1D9BF0; }
.btn-blue:hover { background: #1A8CD8; }
.error { font-size: 13px; color: #F4212E; background: rgba(244,33,46,0.08); border-radius: 8px; padding: 9px 13px; margin-bottom: 14px; display: none; border: 1px solid rgba(244,33,46,0.15); }
.success { font-size: 13px; color: #00BA7C; background: rgba(0,186,124,0.08); border-radius: 8px; padding: 9px 13px; margin-bottom: 14px; display: none; }
.note { font-size: 13px; color: #536471; text-align: center; margin-top: 16px; line-height: 1.6; }
.note a { color: #1D9BF0; text-decoration: none; font-weight: 700; cursor: pointer; }
.note a:hover { text-decoration: underline; }
.divider { display: flex; align-items: center; gap: 10px; margin: 16px 0; }
.div-line { flex: 1; height: 1px; background: #EFF3F4; }
.div-text { font-size: 12px; color: #536471; font-weight: 700; }
.forgot { text-align: center; margin-top: 10px; }
.forgot a { font-size: 13px; color: #536471; cursor: pointer; }
.forgot a:hover { color: #1D9BF0; }
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }
.screen { display: none; }
.screen.active { display: block; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    </div>
    <span class="logo-text">Costax</span>
  </div>

  <div class="tabs">
    <div class="tab active" id="tab-login" onclick="switchTab('login')">Войти</div>
    <div class="tab" id="tab-reg" onclick="switchTab('reg')">Регистрация</div>
  </div>

  <!-- Вход -->
  <div id="screen-login" class="screen active">
    <h2>С возвращением</h2>
    <p class="sub">Введи email и пароль</p>
    <div class="error" id="err-login"></div>
    <label class="label">Email</label>
    <input class="inp" type="email" id="login-email" placeholder="ivan@mail.ru" autocomplete="email" onkeydown="if(event.key==='Enter')doLogin()">
    <label class="label">Пароль</label>
    <input class="inp" type="password" id="login-pass" placeholder="Твой пароль" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn-main btn-blue" id="btn-login" onclick="doLogin()">Войти</button>
    <div class="forgot"><a onclick="doReset()">Забыл пароль?</a></div>
    <p class="note">Нет аккаунта? <a onclick="switchTab('reg')">Зарегистрироваться</a></p>
  </div>

  <!-- Регистрация -->
  <div id="screen-reg" class="screen">
    <h2>Создать аккаунт</h2>
    <p class="sub">Заполни данные — вход сразу после регистрации</p>
    <div class="error" id="err-reg"></div>
    <div class="success" id="ok-reg"></div>
    <label class="label">Email</label>
    <input class="inp" type="email" id="reg-email" placeholder="ivan@mail.ru" autocomplete="email">
    <label class="label">Пароль</label>
    <input class="inp" type="password" id="reg-pass" placeholder="Минимум 6 символов" autocomplete="new-password">
    <label class="label">Повтори пароль</label>
    <input class="inp" type="password" id="reg-pass2" placeholder="Повтори пароль" autocomplete="new-password" onkeydown="if(event.key==='Enter')doRegister()">
    <button class="btn-main" id="btn-reg" onclick="doRegister()">Зарегистрироваться</button>
    <p class="note">Уже есть аккаунт? <a onclick="switchTab('login')">Войти</a></p>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCeveXncaJYszckdflfTVWCDc0AwNilR9k",
  authDomain: "costax-aed53.firebaseapp.com",
  projectId: "costax-aed53",
  storageBucket: "costax-aed53.firebasestorage.app",
  messagingSenderId: "747179946604",
  appId: "1:747179946604:web:073d7faf7d80fb40041e49"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// Уже вошёл — в ленту
onAuthStateChanged(auth, async user => {
  if (!user) return;
  const pd = await getDoc(doc(db, 'users', user.uid));
  if (!pd.exists()) { window.location.href = '/profile.html?setup=1'; return; }
  window.location.href = '/';
});

window.doLogin = async function() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  if (!email) { showErr('err-login', 'Введи email'); return; }
  if (!pass) { showErr('err-login', 'Введи пароль'); return; }
  const btn = document.getElementById('btn-login');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Входим...';
  try {
    await signInWithEmailAndPassword(auth, email, pass);
    // onAuthStateChanged перенаправит
  } catch(e) {
    btn.disabled = false; btn.textContent = 'Войти';
    const msgs = {
      'auth/user-not-found': 'Пользователь не найден',
      'auth/wrong-password': 'Неверный пароль',
      'auth/invalid-credential': 'Неверный email или пароль',
      'auth/too-many-requests': 'Слишком много попыток, подожди немного',
      'auth/invalid-email': 'Неверный формат email'
    };
    showErr('err-login', msgs[e.code] || 'Ошибка: ' + e.message);
  }
};

window.doRegister = async function() {
  const email = document.getElementById('reg-email').value.trim();
  const pass = document.getElementById('reg-pass').value;
  const pass2 = document.getElementById('reg-pass2').value;
  if (!email) { showErr('err-reg', 'Введи email'); return; }
  if (!pass || pass.length < 6) { showErr('err-reg', 'Пароль минимум 6 символов'); return; }
  if (pass !== pass2) { showErr('err-reg', 'Пароли не совпадают'); return; }
  const btn = document.getElementById('btn-reg');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Регистрируем...';
  try {
    await createUserWithEmailAndPassword(auth, email, pass);
    // onAuthStateChanged перенаправит на /profile.html?setup=1
  } catch(e) {
    btn.disabled = false; btn.textContent = 'Зарегистрироваться';
    const msgs = {
      'auth/email-already-in-use': 'Этот email уже зарегистрирован',
      'auth/invalid-email': 'Неверный формат email',
      'auth/weak-password': 'Пароль слишком простой'
    };
    showErr('err-reg', msgs[e.code] || 'Ошибка: ' + e.message);
  }
};

window.doReset = async function() {
  const email = document.getElementById('login-email').value.trim();
  if (!email) { showErr('err-login', 'Введи email для сброса пароля'); return; }
  try {
    await sendPasswordResetEmail(auth, email);
    showErr('err-login', '');
    const el = document.getElementById('err-login');
    el.textContent = 'Письмо со сбросом пароля отправлено!';
    el.style.display = 'block';
    el.style.color = '#00BA7C';
    el.style.background = 'rgba(0,186,124,0.08)';
  } catch(e) {
    showErr('err-login', 'Ошибка: ' + e.message);
  }
};

function showErr(id, msg) {
  const el = document.getElementById(id);
  if (!msg) { el.style.display = 'none'; return; }
  el.textContent = msg;
  el.style.display = 'block';
  el.style.color = '#F4212E';
  el.style.background = 'rgba(244,33,46,0.08)';
  setTimeout(() => el.style.display = 'none', 5000);
}
</script>

<script>
window.switchTab = function(tab) {
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-reg').classList.toggle('active', tab === 'reg');
  document.getElementById('screen-login').classList.toggle('active', tab === 'login');
  document.getElementById('screen-reg').classList.toggle('active', tab === 'reg');
};
</script>
</body>
</html>
