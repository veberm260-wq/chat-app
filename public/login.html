<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Costax — Вход</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, 'Helvetica Neue', sans-serif; background: #0F1117; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
.card { background: #1A1D2E; border: 0.5px solid #2A2D40; border-radius: 16px; width: 100%; max-width: 380px; padding: 40px 36px 36px; }
.logo { display: flex; align-items: center; gap: 10px; margin-bottom: 36px; }
.logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, #6C63FF, #4A90E2); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.logo-text { font-size: 18px; font-weight: 700; color: #E8E9EC; letter-spacing: -0.02em; }
h1 { font-size: 22px; font-weight: 600; color: #E8E9EC; letter-spacing: -0.02em; margin-bottom: 8px; }
.sub { font-size: 14px; color: #8B8FA8; margin-bottom: 28px; line-height: 1.6; }
label { display: block; font-size: 12px; color: #8B8FA8; margin-bottom: 6px; }
input[type="email"] { width: 100%; border: 0.5px solid #2A2D40; border-radius: 10px; padding: 12px 14px; font-size: 14px; color: #E8E9EC; background: #0F1117; outline: none; transition: border-color 0.15s; margin-bottom: 14px; font-family: inherit; }
input[type="email"]:focus { border-color: #6C63FF; }
input[type="email"]::placeholder { color: #4A4D60; }
.btn { width: 100%; background: linear-gradient(135deg, #6C63FF, #4A90E2); color: white; border: none; border-radius: 10px; padding: 13px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; transition: opacity 0.15s; }
.btn:hover { opacity: 0.88; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.note { font-size: 12px; color: #4A4D60; text-align: center; margin-top: 14px; line-height: 1.6; }

/* Экран 2 — проверь почту */
.check-wrap { text-align: center; margin-bottom: 20px; }
.check-icon { width: 56px; height: 56px; border-radius: 50%; background: rgba(108,99,255,0.15); display: flex; align-items: center; justify-content: center; margin: 0 auto; }
.check-icon i { font-size: 26px; color: #6C63FF; }
.email-badge { font-size: 14px; color: #6C63FF; background: rgba(108,99,255,0.1); border-radius: 8px; padding: 8px 14px; margin-bottom: 20px; text-align: center; word-break: break-all; }
.btn-ghost { width: 100%; background: transparent; border: 0.5px solid #2A2D40; border-radius: 10px; padding: 12px; font-size: 13px; color: #8B8FA8; cursor: pointer; font-family: inherit; margin-top: 10px; transition: border-color 0.15s; }
.btn-ghost:hover { border-color: #8B8FA8; color: #E8E9EC; }

.screen { display: none; }
.screen.active { display: block; }
.error { font-size: 12px; color: #E25B5B; background: rgba(226,91,91,0.1); border-radius: 8px; padding: 8px 12px; margin-bottom: 12px; display: none; }
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body>
<div class="card">

  <!-- Экран 1: Ввод email -->
  <div id="s1" class="screen active">
    <div class="logo">
      <div class="logo-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      </div>
      <div class="logo-text">Costax</div>
    </div>
    <h1>Добро пожаловать</h1>
    <p class="sub">Введи email — пришлём ссылку для входа. Без пароля.</p>
    <div id="err1" class="error"></div>
    <label>Email</label>
    <input type="email" id="email-inp" placeholder="ivan@mail.ru" autocomplete="email" onkeydown="if(event.key==='Enter')sendLink()">
    <button class="btn" id="btn-send" onclick="sendLink()">Войти</button>
    <p class="note">Нажав кнопку, ты получишь письмо со ссылкой для входа</p>
  </div>

  <!-- Экран 2: Проверь почту -->
  <div id="s2" class="screen">
    <div class="logo">
      <div class="logo-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      </div>
      <div class="logo-text">Costax</div>
    </div>
    <div class="check-wrap">
      <div class="check-icon"><i class="ti ti-mail"></i></div>
    </div>
    <h1 style="text-align:center;margin-bottom:8px">Проверь почту</h1>
    <p class="sub" style="text-align:center;margin-bottom:16px">Отправили ссылку для входа на</p>
    <div class="email-badge" id="email-show"></div>
    <p class="sub" style="text-align:center;font-size:13px">Открой письмо и нажми на ссылку — тебя автоматически перенесёт в ленту</p>
    <button class="btn-ghost" onclick="resend()">Отправить снова</button>
    <button class="btn-ghost" onclick="goBack()" style="margin-top:6px">← Изменить email</button>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, sendSignInLinkToEmail, isSignInWithEmailLink, signInWithEmailLink, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCeveXncaJYszckdflfTVWCDc0AwNilR9k",
  authDomain: "costax-aed53.firebaseapp.com",
  projectId: "costax-aed53",
  storageBucket: "costax-aed53.firebasestorage.app",
  messagingSenderId: "747179946604",
  appId: "1:747179946604:web:073d7faf7d80fb40041e49"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const actionCodeSettings = {
  url: 'https://www.costax.ru/login',
  handleCodeInApp: true,
};

// Если уже вошёл — сразу в ленту
onAuthStateChanged(auth, user => {
  if (user && !isSignInWithEmailLink(auth, window.location.href)) {
    window.location.href = '/';
  }
});

// Проверяем — вдруг пользователь вернулся по ссылке из письма
if (isSignInWithEmailLink(auth, window.location.href)) {
  let email = window.localStorage.getItem('emailForSignIn');
  if (!email) email = window.prompt('Введи свой email для подтверждения:');
  signInWithEmailLink(auth, email, window.location.href)
    .then(() => {
      window.localStorage.removeItem('emailForSignIn');
      window.location.href = '/';
    })
    .catch(e => showError('err1', 'Ошибка входа: ' + e.message));
}

window.sendLink = async function() {
  const email = document.getElementById('email-inp').value.trim();
  if (!email) { showError('err1', 'Введи email'); return; }
  if (!email.includes('@')) { showError('err1', 'Неверный формат email'); return; }
  const btn = document.getElementById('btn-send');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Отправляем...';
  try {
    await sendSignInLinkToEmail(auth, email, actionCodeSettings);
    window.localStorage.setItem('emailForSignIn', email);
    document.getElementById('email-show').textContent = email;
    document.getElementById('s1').classList.remove('active');
    document.getElementById('s2').classList.add('active');
  } catch(e) {
    btn.disabled = false;
    btn.textContent = 'Войти';
    showError('err1', 'Ошибка: ' + e.message);
  }
};

window.resend = async function() {
  const email = window.localStorage.getItem('emailForSignIn');
  if (!email) { goBack(); return; }
  try {
    await sendSignInLinkToEmail(auth, email, actionCodeSettings);
    alert('Письмо отправлено повторно!');
  } catch(e) { alert('Ошибка: ' + e.message); }
};

window.goBack = function() {
  document.getElementById('s2').classList.remove('active');
  document.getElementById('s1').classList.add('active');
  document.getElementById('btn-send').disabled = false;
  document.getElementById('btn-send').textContent = 'Войти';
};

function showError(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 5000);
}
</script>
</body>
</html>
