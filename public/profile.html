<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Costax — Профиль</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, 'Helvetica Neue', sans-serif; background: #0F1117; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
.card { background: #1A1D2E; border: 0.5px solid #2A2D40; border-radius: 16px; width: 100%; max-width: 400px; padding: 36px 32px 32px; }
.logo { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
.logo-icon { width: 30px; height: 30px; background: linear-gradient(135deg, #6C63FF, #4A90E2); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.logo-text { font-size: 17px; font-weight: 700; color: #E8E9EC; letter-spacing: -0.02em; }
h1 { font-size: 22px; font-weight: 600; color: #E8E9EC; margin-bottom: 6px; letter-spacing: -0.02em; }
.sub { font-size: 13px; color: #8B8FA8; margin-bottom: 24px; line-height: 1.6; }
.avatar-row { display: flex; align-items: center; gap: 14px; margin-bottom: 22px; }
.avatar-circle { width: 64px; height: 64px; border-radius: 50%; background: linear-gradient(135deg, #6C63FF, #4A90E2); display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 700; color: white; cursor: pointer; overflow: hidden; flex-shrink: 0; transition: opacity 0.15s; border: 2px solid #2A2D40; }
.avatar-circle:hover { opacity: 0.8; }
.avatar-circle img { width: 100%; height: 100%; object-fit: cover; }
.av-hint b { font-size: 13px; color: #E8E9EC; display: block; margin-bottom: 3px; font-weight: 500; }
.av-hint span { font-size: 12px; color: #8B8FA8; }
.field-label { font-size: 12px; color: #8B8FA8; margin-bottom: 6px; display: block; }
.field { width: 100%; border: 0.5px solid #2A2D40; border-radius: 10px; padding: 11px 13px; font-size: 14px; color: #E8E9EC; background: #0F1117; outline: none; transition: border-color 0.15s; margin-bottom: 14px; font-family: inherit; }
.field:focus { border-color: #6C63FF; }
.field::placeholder { color: #4A4D60; }
.field.readonly { color: #4A4D60; cursor: default; }
.prefix-wrap { position: relative; margin-bottom: 14px; }
.prefix-wrap .prefix { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); font-size: 14px; color: #4A4D60; pointer-events: none; }
.prefix-wrap .field { padding-left: 26px; margin-bottom: 0; }
.error { font-size: 12px; color: #E25B5B; background: rgba(226,91,91,0.1); border-radius: 8px; padding: 8px 12px; margin-bottom: 12px; display: none; }
.btn-main { width: 100%; background: linear-gradient(135deg, #6C63FF, #4A90E2); color: white; border: none; border-radius: 10px; padding: 13px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; transition: opacity 0.15s; }
.btn-main:hover { opacity: 0.88; }
.btn-main:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-logout { width: 100%; background: transparent; border: 0.5px solid #2A2D40; border-radius: 10px; padding: 12px; font-size: 13px; color: #8B8FA8; cursor: pointer; font-family: inherit; margin-top: 10px; transition: all 0.15s; }
.btn-logout:hover { border-color: #E25B5B; color: #E25B5B; }
.note { font-size: 12px; color: #4A4D60; text-align: center; margin-top: 10px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    </div>
    <span class="logo-text">Costax</span>
  </div>

  <h1>Твой профиль</h1>
  <p class="sub">Как тебя будут видеть в ленте</p>

  <div class="avatar-row">
    <div class="avatar-circle" id="avatar-circle" onclick="document.getElementById('photo-inp').click()">М</div>
    <input type="file" id="photo-inp" accept="image/*" style="display:none" onchange="previewPhoto(this)">
    <div class="av-hint">
      <b>Фото профиля</b>
      <span>Нажми чтобы загрузить</span>
    </div>
  </div>

  <div id="error-msg" class="error"></div>

  <label class="field-label">Имя</label>
  <input type="text" id="inp-name" class="field" placeholder="Иван Петров" maxlength="40">

  <label class="field-label">Username</label>
  <div class="prefix-wrap">
    <span class="prefix">@</span>
    <input type="text" id="inp-username" class="field" placeholder="ivan" maxlength="20" oninput="this.value=this.value.toLowerCase().replace(/[^a-z0-9_]/g,'')">
  </div>

  <label class="field-label">Email</label>
  <input type="email" id="inp-email" class="field readonly" readonly>

  <button class="btn-main" id="btn-save" onclick="saveProfile()">Сохранить и войти в ленту</button>
  <p class="note">Можно изменить в любой момент</p>
  <button class="btn-logout" onclick="logout()">Выйти из аккаунта</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCeveXncaJYszckdflfTVWCDc0AwNilR9k",
  authDomain: "costax-aed53.firebaseapp.com",
  projectId: "costax-aed53",
  storageBucket: "costax-aed53.firebasestorage.app",
  messagingSenderId: "747179946604",
  appId: "1:747179946604:web:073d7faf7d80fb40041e49"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
let currentUser = null;

onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.href = '/login'; return; }
  currentUser = user;
  document.getElementById('inp-email').value = user.email || '';
  const pd = await getDoc(doc(db, 'users', user.uid));
  if (pd.exists()) {
    const d = pd.data();
    document.getElementById('inp-name').value = d.name || '';
    document.getElementById('inp-username').value = d.username || '';
    const av = document.getElementById('avatar-circle');
    if (d.photoURL) av.innerHTML = `<img src="${d.photoURL}">`;
    else av.textContent = (d.name || user.email || 'U')[0].toUpperCase();
  } else {
    document.getElementById('avatar-circle').textContent = (user.email || 'U')[0].toUpperCase();
  }
});

window.previewPhoto = function(inp) {
  if (inp.files && inp.files[0]) {
    const r = new FileReader();
    r.onload = e => document.getElementById('avatar-circle').innerHTML = `<img src="${e.target.result}">`;
    r.readAsDataURL(inp.files[0]);
  }
};

window.saveProfile = async function() {
  const name = document.getElementById('inp-name').value.trim();
  const username = document.getElementById('inp-username').value.trim();
  if (!name) { showError('Введи имя'); return; }
  if (!username || username.length < 3) { showError('Username минимум 3 символа'); return; }
  const btn = document.getElementById('btn-save');
  btn.disabled = true;
  btn.textContent = 'Сохраняем...';
  try {
    const existing = await getDoc(doc(db, 'users', currentUser.uid));
    const photoURL = existing.exists() ? existing.data().photoURL || null : null;
    await setDoc(doc(db, 'users', currentUser.uid), {
      name, username, photoURL,
      email: currentUser.email,
      verified: existing.exists() ? existing.data().verified || false : false,
      updatedAt: new Date()
    });
    window.location.href = '/';
  } catch(e) {
    showError('Ошибка: ' + e.message);
    btn.disabled = false;
    btn.textContent = 'Сохранить и войти в ленту';
  }
};

window.logout = async function() {
  if (!confirm('Выйти из аккаунта?')) return;
  await signOut(auth);
  window.location.href = '/login';
};

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 4000);
}
</script>
</body>
</html>
