body { font-family: 'Nunito', -apple-system, sans-serif; height: 100vh; display: flex; overflow: hidden; transition: background 0.3s, color 0.3s; }
body.light { background: #FFFFFF; color: #0F1419; }

#stars-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; display: none; }

/* SIDEBAR */
.sidebar { width: 220px; min-width: 220px; height: 100vh; display: flex; flex-direction: column; padding: 8px 12px 16px; position: relative; z-index: 10; transition: background 0.3s, border-color 0.3s; }

.s-logo-icon { width: 34px; height: 34px; background: #1D9BF0; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.s-logo-text { font-size: 20px; font-weight: 800; letter-spacing: -0.03em; transition: color 0.3s; }

body.dark .s-item { color: #E7E9EA; }

body.dark .s-item:hover { background: #181818; }
.s-item.active { color: #1D9BF0; }
.s-item i { font-size: 22px; }

.s-divider { height: 1px; margin: 8px 0; transition: background 0.3s; }
body.light .s-divider { background: #EFF3F4; }
body.dark .s-divider { background: #2F3336; }

.s-user-mini { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 9999px; cursor: pointer; transition: background 0.15s; }
body.light .s-user-mini:hover { background: #E7E9EA; }
body.dark .s-user-mini:hover { background: #181818; }
.s-av-mini { width: 38px; height: 38px; border-radius: 50%; background: #1D9BF0; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800; color: white; flex-shrink: 0; }

body.dark .s-uhandle { color: #71767B; }

body.light .theme-row { color: #0F1419; }
body.dark .theme-row { color: #E7E9EA; }

body.dark .theme-row:hover { background: #181818; }

.toggle-pill { width: 42px; height: 24px; border-radius: 12px; position: relative; margin-left: auto; transition: background 0.25s; flex-shrink: 0; }

<script>
function initStars() {
  const canvas = document.getElementById('stars-canvas');
  const ctx = canvas.getContext('2d');
  let stars = [];
  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  function createStars() {
    stars = [];
    for (let i = 0; i < 200; i++) stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*1.2+0.2, speed: 0.003+Math.random()*0.008, phase: Math.random()*Math.PI*2 });
  }
  function draw(t) {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    stars.forEach(s => { const a = 0.15+0.65*(0.5+0.5*Math.sin(t*s.speed+s.phase)); ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fillStyle=`rgba(255,255,255,${a})`; ctx.fill(); });
    requestAnimationFrame(draw);
  }
  resize(); createStars(); window.addEventListener('resize', () => { resize(); createStars(); }); requestAnimationFrame(draw);
}
initStars();

let isDark = false;
function toggleTheme() {
  isDark = !isDark;
  document.body.className = isDark ? 'dark' : 'light';
  document.getElementById('theme-icon').className = isDark ? 'ti ti-sun' : 'ti ti-moon';
  document.getElementById('theme-label').textContent = isDark ? 'Светлая тема' : 'Тёмная тема';
  document.getElementById('toggle-pill').style.background = isDark ? '#1D9BF0' : '#E7E9EA';
  document.getElementById('toggle-dot').style.left = isDark ? '20px' : '2px';
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
}
if (localStorage.getItem('theme') === 'dark') toggleTheme();

function toggleEdit() {
  const form = document.getElementById('edit-form');
  form.classList.toggle('show');
}
</script>

onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.href = '/login'; return; }

function renderProfile(p, user) {
  const init = (p.name||'U')[0].toUpperCase();
  document.getElementById('sidebar-av').textContent = init;
  document.getElementById('sidebar-name').textContent = p.name||'';
  document.getElementById('sidebar-handle').textContent = '@'+(p.username||'');
  document.getElementById('profile-av').textContent = init;
  document.getElementById('profile-name').innerHTML = esc(p.name||'') + ' ' + `<span style="display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px"><svg viewBox="0 0 24 24" width="20" height="20"><g><path d="M22.25 12c0-1.43-.88-2.67-2.19-3.34.46-1.39.2-2.9-.81-3.91s-2.52-1.27-3.91-.81c-.66-1.31-1.91-2.19-3.34-2.19s-2.67.88-3.33 2.19c-1.4-.46-2.91-.2-3.92.81s-1.26 2.52-.8 3.91c-1.31.67-2.2 1.91-2.2 3.34s.89 2.67 2.2 3.34c-.46 1.39-.21 2.9.8 3.91s2.52 1.26 3.91.81c.67 1.31 1.91 2.19 3.34 2.19s2.68-.88 3.34-2.19c1.39.45 2.9.2 3.91-.81s1.27-2.52.81-3.91c1.31-.67 2.19-1.91 2.19-3.34zm-11.71 4.2L6.8 12.46l1.41-1.42 2.26 2.26 4.8-5.23 1.47 1.36-6.2 6.77z" fill="#1D9BF0"/></g></svg></span>`;
  document.getElementById('profile-handle').textContent = '@'+(p.username||'');
  document.getElementById('inp-name').value = p.name||'';
  document.getElementById('inp-username').value = p.username||'';
  document.getElementById('inp-email').value = user.email||'';
  const followers = p.followers?.length || 0;
  const following = p.following?.length || 0;
  document.getElementById('stat-followers').innerHTML = `<b>${followers}</b> подписчиков`;
  document.getElementById('stat-following').innerHTML = `<b>${following}</b> подписок`;
}

async function loadPosts() {
  const q = query(collection(db,'posts'), where('authorId','==',me.uid), orderBy('createdAt','desc'));
  const snap = await getDocs(q);
  document.getElementById('stat-posts').innerHTML = `<b>${snap.size}</b> постов`;
  const list = document.getElementById('posts-list');
  if (snap.empty) { list.innerHTML = '<div class="empty">Нет постов — напиши первый!</div>'; return; }
  list.innerHTML = '';
  snap.forEach(d => {
    const data = d.data();
    const liked = data.likes?.includes(me.uid);
    const count = data.likes?.length || 0;
    const time = data.createdAt ? timeAgo(data.createdAt.toDate()) : '';
    const div = document.createElement('div');
    div.className = 'post';
    div.innerHTML = `
      <div class="p-av">${(myProfile.name||'U')[0].toUpperCase()}</div>
      <div class="p-body">
        <div class="p-time">${time}</div>
        <div class="post-text">${esc(data.text)}</div>
        <div class="post-actions">
          <button class="p-action ${liked?'liked':''}" onclick="toggleLike('${d.id}',${liked})">
            <i class="ti ti-heart"></i>${count > 0 ? count : ''}
          </button>
        </div>
      </div>`;
    list.appendChild(div);
  });
}

window.toggleLike = async function(id, liked) {
  const ref = doc(db,'posts',id);
  if (liked) await updateDoc(ref, {likes: arrayRemove(me.uid)});
  else await updateDoc(ref, {likes: arrayUnion(me.uid)});
  await loadPosts();
};

window.previewPhoto = function(inp) {
  if (inp.files && inp.files[0]) {
    const r = new FileReader();
    r.onload = e => { document.getElementById('profile-av').innerHTML = `<img src="${e.target.result}">`; };
    r.readAsDataURL(inp.files[0]);
  }
};

window.saveProfile = async function() {
  const name = document.getElementById('inp-name').value.trim();
  const username = document.getElementById('inp-username').value.trim();
  if (!name) { showError('Введи имя'); return; }
  if (!username || username.length < 3) { showError('Username минимум 3 символа'); return; }
  const btn = document.getElementById('btn-save');
  btn.disabled = true; btn.textContent = 'Сохраняем...';
  try {
    await setDoc(doc(db,'users',me.uid), {
      name, username, email: me.email,
      verified: myProfile.verified||false,
      photoURL: myProfile.photoURL||null,
      followers: myProfile.followers||[],
      following: myProfile.following||[],
      updatedAt: new Date()
    });
    myProfile = { ...myProfile, name, username };
    renderProfile(myProfile, me);
    toggleEdit();
  } catch(e) { showError('Ошибка: '+e.message); }
  btn.disabled = false; btn.textContent = 'Сохранить';
};

window.logout = async function() {
  if (!confirm('Выйти из аккаунта?')) return;
  await signOut(auth);
  window.location.href = '/login';
};

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg; el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 4000);
}
function timeAgo(d) {
  const s = Math.floor((Date.now()-d)/1000);
  if (s<60) return 'только что';
  if (s<3600) return Math.floor(s/60)+' мин назад';
  if (s<86400) return Math.floor(s/3600)+' ч назад';
  return Math.floor(s/86400)+' д назад';
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
