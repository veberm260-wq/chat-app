<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Costax</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, 'Helvetica Neue', sans-serif; background: #0F1117; color: #E8E9EC; height: 100vh; display: flex; overflow: hidden; }

.sidebar { width: 220px; min-width: 220px; background: #0F1117; border-right: 0.5px solid #1E2030; display: flex; flex-direction: column; padding: 24px 14px; gap: 2px; height: 100vh; }
.s-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; padding: 0 10px; }
.s-logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, #6C63FF, #4A90E2); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.s-logo-text { font-size: 18px; font-weight: 700; color: #E8E9EC; letter-spacing: -0.02em; }
.s-item { display: flex; align-items: center; gap: 12px; padding: 11px 12px; border-radius: 10px; font-size: 14px; color: #8B8FA8; cursor: pointer; transition: all 0.15s; text-decoration: none; }
.s-item:hover { background: #1A1D2E; color: #E8E9EC; }
.s-item.active { background: #1A1D2E; color: #E8E9EC; font-weight: 500; }
.s-item i { font-size: 18px; }
.s-divider { height: 0.5px; background: #1E2030; margin: 10px 0; }
.s-bottom { margin-top: auto; }
.s-user { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; cursor: pointer; }
.s-user:hover { background: #1A1D2E; }
.s-av { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg, #6C63FF, #4A90E2); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: white; flex-shrink: 0; }
.s-name { font-size: 13px; color: #E8E9EC; font-weight: 500; }
.s-handle { font-size: 11px; color: #8B8FA8; }

.main { flex: 1; display: flex; overflow: hidden; }
.feed-col { flex: 1; display: flex; flex-direction: column; overflow: hidden; border-right: 0.5px solid #1E2030; }
.topbar { padding: 14px 20px; border-bottom: 0.5px solid #1E2030; background: rgba(15,17,23,0.95); display: flex; align-items: center; gap: 20px; flex-shrink: 0; }
.tab { font-size: 14px; color: #8B8FA8; cursor: pointer; padding-bottom: 4px; }
.tab.active { color: #E8E9EC; font-weight: 600; border-bottom: 2px solid #6C63FF; }
.feed { flex: 1; overflow-y: auto; }

.compose { padding: 16px 20px; border-bottom: 0.5px solid #1E2030; display: flex; gap: 12px; }
.c-av { width: 38px; height: 38px; border-radius: 50%; background: linear-gradient(135deg, #6C63FF, #4A90E2); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: white; flex-shrink: 0; }
.compose-right { flex: 1; }
.c-textarea { width: 100%; border: none; background: transparent; font-size: 15px; color: #E8E9EC; outline: none; resize: none; font-family: inherit; line-height: 1.6; min-height: 52px; }
.c-textarea::placeholder { color: #4A4D60; }
.compose-bottom { display: flex; justify-content: space-between; align-items: center; padding-top: 10px; border-top: 0.5px solid #1E2030; margin-top: 8px; }
.c-count { font-size: 12px; color: #4A4D60; }
.btn-post { background: linear-gradient(135deg, #6C63FF, #4A90E2); color: white; border: none; border-radius: 20px; padding: 8px 20px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
.btn-post:hover { opacity: 0.88; }
.btn-post:disabled { opacity: 0.4; cursor: not-allowed; }

.post { padding: 16px 20px; border-bottom: 0.5px solid #1E2030; transition: background 0.1s; }
.post:hover { background: #13151F; }
.post-inner { display: flex; gap: 10px; }
.p-av { width: 38px; height: 38px; border-radius: 50%; background: linear-gradient(135deg, #6C63FF, #4A90E2); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: white; flex-shrink: 0; cursor: pointer; }
.p-av:hover { opacity: 0.8; }
.p-body { flex: 1; min-width: 0; }
.p-name-row { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; margin-bottom: 5px; cursor: pointer; }
.p-name-row:hover .p-name { color: #6C63FF; }
.p-name { font-size: 14px; font-weight: 600; color: #E8E9EC; transition: color 0.15s; }
.verified { display: inline-flex; align-items: center; justify-content: center; width: 16px; height: 16px; background: #4A90E2; border-radius: 50%; flex-shrink: 0; }
.verified svg { width: 9px; height: 9px; }
.p-handle { font-size: 13px; color: #8B8FA8; }
.p-dot { color: #4A4D60; font-size: 11px; }
.p-time { font-size: 12px; color: #4A4D60; }
.post-text { font-size: 14px; color: #C8CAD8; line-height: 1.6; margin-bottom: 10px; word-break: break-word; }
.post-actions { display: flex; gap: 4px; }
.p-action { display: flex; align-items: center; gap: 5px; font-size: 13px; color: #4A4D60; cursor: pointer; background: none; border: none; font-family: inherit; padding: 5px 10px; border-radius: 20px; transition: all 0.15s; }
.p-action:hover { color: #6C63FF; background: rgba(108,99,255,0.1); }
.p-action.liked { color: #E25B5B; }
.p-action i { font-size: 15px; }

.right-panel { width: 290px; min-width: 290px; padding: 16px; display: flex; flex-direction: column; gap: 14px; overflow-y: auto; }
.r-search { display: flex; align-items: center; gap: 8px; background: #1A1D2E; border-radius: 20px; padding: 9px 14px; }
.r-search input { flex: 1; border: none; background: transparent; font-size: 13px; color: #E8E9EC; outline: none; font-family: inherit; }
.r-search input::placeholder { color: #4A4D60; }
.r-search i { font-size: 15px; color: #4A4D60; }
.r-card { background: #1A1D2E; border-radius: 14px; padding: 14px 16px; }
.r-card-title { font-size: 15px; font-weight: 700; color: #E8E9EC; margin-bottom: 12px; }
.r-user { display: flex; align-items: center; gap: 10px; padding: 7px 0; cursor: pointer; }
.r-user:hover .ru-name { color: #6C63FF; }
.ru-av { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg, #6C63FF, #4A90E2); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: white; flex-shrink: 0; }
.ru-name { font-size: 13px; font-weight: 500; color: #E8E9EC; display: flex; align-items: center; gap: 4px; transition: color 0.15s; }
.ru-handle { font-size: 12px; color: #8B8FA8; }
.search-dropdown { background: #1A1D2E; border-radius: 12px; padding: 6px; display: none; margin-top: 8px; }
.search-dropdown.show { display: block; }
.sd-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; cursor: pointer; }
.sd-item:hover { background: #232640; }
.empty { padding: 40px 20px; text-align: center; color: #4A4D60; font-size: 14px; }

.mob-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: #0F1117; border-top: 0.5px solid #1E2030; z-index: 100; padding: 8px 0 max(8px, env(safe-area-inset-bottom)); }
.mob-nav-inner { display: flex; justify-content: space-around; }
.mob-item { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 4px 16px; color: #4A4D60; text-decoration: none; font-size: 10px; }
.mob-item.active { color: #6C63FF; }
.mob-item i { font-size: 22px; }

@media (max-width: 900px) { .right-panel { display: none; } }
@media (max-width: 640px) {
  .sidebar { display: none; }
  .mob-nav { display: block; }
  .main { padding-bottom: 60px; }
}
</style>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body>

<div class="sidebar">
  <div class="s-logo">
    <div class="s-logo-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    </div>
    <div class="s-logo-text">Costax</div>
  </div>
  <a class="s-item active" href="/"><i class="ti ti-home"></i>Главная</a>
  <a class="s-item" href="/messages.html"><i class="ti ti-message"></i>Сообщения</a>
  <a class="s-item" href="/profile.html"><i class="ti ti-user"></i>Профиль</a>
  <div class="s-divider"></div>
  <div class="s-bottom">
    <div class="s-user" onclick="window.location.href='/profile.html'">
      <div class="s-av" id="sidebar-av">М</div>
      <div>
        <div class="s-name" id="sidebar-name">...</div>
        <div class="s-handle" id="sidebar-handle">@...</div>
      </div>
    </div>
  </div>
</div>

<div class="main">
  <div class="feed-col">
    <div class="topbar">
      <div class="tab active">Главная</div>
      <div style="margin-left:auto;font-size:12px;color:#4A4D60" id="post-count"></div>
    </div>
    <div class="feed">
      <div class="compose">
        <div class="c-av" id="compose-av">М</div>
        <div class="compose-right">
          <textarea class="c-textarea" id="post-text" placeholder="Что у тебя нового?" oninput="updateCount()" maxlength="280"></textarea>
          <div class="compose-bottom">
            <span class="c-count" id="char-count">280</span>
            <button class="btn-post" id="btn-post" onclick="publishPost()">Опубликовать</button>
          </div>
        </div>
      </div>
      <div id="posts-list"><div class="empty">Загрузка...</div></div>
    </div>
  </div>

  <div class="right-panel">
    <div class="r-search">
      <i class="ti ti-search"></i>
      <input type="text" id="search-inp" placeholder="Поиск пользователей" oninput="searchUsers(this.value)" onblur="setTimeout(hideSearch,200)">
    </div>
    <div class="search-dropdown" id="search-dropdown"></div>
    <div class="r-card">
      <div class="r-card-title">Пользователи</div>
      <div id="users-list"></div>
    </div>
  </div>
</div>

<nav class="mob-nav">
  <div class="mob-nav-inner">
    <a class="mob-item active" href="/"><i class="ti ti-home"></i>Лента</a>
    <a class="mob-item" href="/messages.html"><i class="ti ti-message"></i>Чаты</a>
    <a class="mob-item" href="/profile.html"><i class="ti ti-user"></i>Профиль</a>
  </div>
</nav>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, orderBy, query, doc, getDoc, getDocs, updateDoc, arrayUnion, arrayRemove, serverTimestamp, where, limit } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCeveXncaJYszckdflfTVWCDc0AwNilR9k",
  authDomain: "costax-aed53.firebaseapp.com",
  projectId: "costax-aed53",
  storageBucket: "costax-aed53.firebasestorage.app",
  messagingSenderId: "747179946604",
  appId: "1:747179946604:web:073d7faf7d80fb40041e49"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
let me = null, myProfile = null;

const checkSvg = `<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
const badge = `<span class="verified">${checkSvg}</span>`;

onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.href = '/login'; return; }
  me = user;
  const pd = await getDoc(doc(db, 'users', user.uid));
  if (!pd.exists()) { window.location.href = '/profile.html?setup=1'; return; }
  myProfile = pd.data();
  const init = (myProfile.name||'U')[0].toUpperCase();
  document.getElementById('sidebar-av').textContent = init;
  document.getElementById('sidebar-name').textContent = myProfile.name||'';
  document.getElementById('sidebar-handle').textContent = '@'+(myProfile.username||'');
  document.getElementById('compose-av').textContent = init;
  loadFeed();
  loadUsers();
});

function loadFeed() {
  const q = query(collection(db, 'posts'), orderBy('createdAt', 'desc'));
  onSnapshot(q, snap => {
    document.getElementById('post-count').textContent = snap.size + ' постов';
    const list = document.getElementById('posts-list');
    if (snap.empty) { list.innerHTML = '<div class="empty">Пока нет постов!</div>'; return; }
    list.innerHTML = '';
    snap.forEach(d => list.appendChild(renderPost(d.id, d.data())));
  });
}

function renderPost(id, data) {
  const liked = data.likes?.includes(me?.uid);
  const count = data.likes?.length || 0;
  const init = (data.authorName||'U')[0].toUpperCase();
  const time = data.createdAt ? timeAgo(data.createdAt.toDate()) : '';
  const div = document.createElement('div');
  div.className = 'post';
  div.innerHTML = `
    <div class="post-inner">
      <div class="p-av" onclick="msgUser('${data.authorId}')">${init}</div>
      <div class="p-body">
        <div class="p-name-row" onclick="msgUser('${data.authorId}')">
          <span class="p-name">${esc(data.authorName||'Аноним')}</span>
          ${badge}
          <span class="p-handle">@${esc(data.authorUsername||'user')}</span>
          <span class="p-dot">·</span>
          <span class="p-time">${time}</span>
        </div>
        <div class="post-text">${esc(data.text)}</div>
        <div class="post-actions">
          <button class="p-action ${liked?'liked':''}" onclick="toggleLike('${id}',${liked})">
            <i class="ti ti-heart"></i>${count}
          </button>
          <button class="p-action" onclick="msgUser('${data.authorId}')">
            <i class="ti ti-message-circle"></i>Написать
          </button>
        </div>
      </div>
    </div>`;
  return div;
}

async function loadUsers() {
  const snap = await getDocs(query(collection(db, 'users'), limit(10)));
  const list = document.getElementById('users-list');
  list.innerHTML = '';
  snap.forEach(d => {
    if (d.id === me?.uid) return;
    const u = d.data();
    const div = document.createElement('div');
    div.className = 'r-user';
    div.innerHTML = `<div class="ru-av">${(u.name||'U')[0].toUpperCase()}</div><div><div class="ru-name">${esc(u.name)}${badge}</div><div class="ru-handle">@${esc(u.username)}</div></div>`;
    div.onclick = () => window.location.href = '/messages.html?uid='+d.id;
    list.appendChild(div);
  });
}

window.msgUser = function(uid) {
  if (!uid || uid === me?.uid) return;
  window.location.href = '/messages.html?uid=' + uid;
};

window.publishPost = async function() {
  const text = document.getElementById('post-text').value.trim();
  if (!text || !myProfile) return;
  const btn = document.getElementById('btn-post');
  btn.disabled = true;
  await addDoc(collection(db, 'posts'), {
    text, authorId: me.uid, authorName: myProfile.name,
    authorUsername: myProfile.username,
    likes: [], createdAt: serverTimestamp()
  });
  document.getElementById('post-text').value = '';
  document.getElementById('char-count').textContent = '280';
  btn.disabled = false;
};

window.toggleLike = async function(id, liked) {
  if (!me) return;
  const ref = doc(db, 'posts', id);
  if (liked) await updateDoc(ref, {likes: arrayRemove(me.uid)});
  else await updateDoc(ref, {likes: arrayUnion(me.uid)});
};

window.searchUsers = async function(val) {
  const dd = document.getElementById('search-dropdown');
  if (!val.trim()) { dd.classList.remove('show'); return; }
  const q = query(collection(db,'users'), where('username','>=',val.toLowerCase()), where('username','<=',val.toLowerCase()+'\uf8ff'), limit(6));
  const snap = await getDocs(q);
  dd.innerHTML = '';
  snap.forEach(d => {
    const u = d.data();
    const div = document.createElement('div');
    div.className = 'sd-item';
    div.innerHTML = `<div class="ru-av" style="width:30px;height:30px;font-size:11px">${(u.name||'U')[0].toUpperCase()}</div><div><div style="font-size:13px;color:#E8E9EC">${esc(u.name)}${badge}</div><div style="font-size:12px;color:#8B8FA8">@${esc(u.username)}</div></div>`;
    div.onclick = () => window.location.href = '/messages.html?uid='+d.id;
    dd.appendChild(div);
  });
  dd.classList.toggle('show', !snap.empty);
};
window.hideSearch = () => document.getElementById('search-dropdown').classList.remove('show');
window.updateCount = () => document.getElementById('char-count').textContent = 280 - document.getElementById('post-text').value.length;

function timeAgo(d) {
  const s = Math.floor((Date.now()-d)/1000);
  if (s<60) return 'только что';
  if (s<3600) return Math.floor(s/60)+' мин';
  if (s<86400) return Math.floor(s/3600)+' ч';
  return Math.floor(s/86400)+' д';
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
