<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Costax</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, 'Helvetica Neue', sans-serif; background: #F5F0E8; height: 100vh; display: flex; overflow: hidden; }

/* Mobile bottom nav */
.mob-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: #2D3A1E; border-top: 0.5px solid rgba(200,168,75,0.2); z-index: 100; padding: 8px 0 max(8px, env(safe-area-inset-bottom)); }
.mob-nav-inner { display: flex; justify-content: space-around; }
.mob-item { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 4px 16px; color: #6B7A52; text-decoration: none; font-size: 10px; cursor: pointer; }
.mob-item.active { color: #C8A84B; }
.mob-item i { font-size: 22px; }

/* Sidebar */
.sidebar { width: 200px; min-width: 200px; background: #2D3A1E; display: flex; flex-direction: column; padding: 20px 14px; gap: 4px; height: 100vh; }
.s-logo { font-size: 13px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #C8A84B; margin-bottom: 24px; padding: 0 8px; }
.s-item { display: flex; align-items: center; gap: 10px; padding: 10px 10px; border-radius: 8px; font-size: 13px; color: #9CAF7A; cursor: pointer; transition: background 0.15s; text-decoration: none; }
.s-item:hover { background: rgba(200,168,75,0.1); color: #C8A84B; }
.s-item.active { background: rgba(200,168,75,0.15); color: #C8A84B; font-weight: 500; }
.s-item i { font-size: 17px; }
.s-divider { height: 0.5px; background: rgba(255,255,255,0.08); margin: 8px 0; }
.s-bottom { margin-top: auto; }
.s-user { display: flex; align-items: center; gap: 8px; padding: 10px 10px; border-radius: 8px; cursor: pointer; }
.s-user:hover { background: rgba(255,255,255,0.05); }
.s-av { width: 32px; height: 32px; border-radius: 50%; background: #C8A84B; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #2D3A1E; flex-shrink: 0; overflow: hidden; }
.s-av img { width: 100%; height: 100%; object-fit: cover; }
.s-info { overflow: hidden; }
.s-name { font-size: 12px; color: #E8E0CC; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.s-handle { font-size: 11px; color: #6B7A52; }

/* Main */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar { padding: 13px 20px; border-bottom: 0.5px solid #DDD5C0; background: #FDFAF4; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.topbar-title { font-size: 15px; font-weight: 600; color: #2D3A1E; }
.search-wrap { position: relative; }
.search-inp { background: #F5F0E8; border: 0.5px solid #DDD5C0; border-radius: 8px; padding: 7px 12px 7px 32px; font-size: 13px; color: #2D3A1E; outline: none; width: 200px; font-family: inherit; }
.search-inp::placeholder { color: #B8A882; }
.search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 14px; color: #B8A882; pointer-events: none; }
.search-results { position: absolute; top: 36px; right: 0; width: 240px; background: #FDFAF4; border: 0.5px solid #DDD5C0; border-radius: 10px; padding: 6px; z-index: 100; display: none; }
.search-results.show { display: block; }
.s-result { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 7px; cursor: pointer; }
.s-result:hover { background: #F5F0E8; }
.sr-av { width: 28px; height: 28px; border-radius: 50%; background: #C8A84B; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #2D3A1E; flex-shrink: 0; }
.sr-name { font-size: 13px; font-weight: 500; color: #2D3A1E; }
.sr-handle { font-size: 11px; color: #B8A882; }

.feed { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; max-width: 640px; width: 100%; }

/* Compose */
.compose { background: #FDFAF4; border: 0.5px solid #DDD5C0; border-radius: 12px; padding: 14px 16px; }
.compose-top { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 10px; }
.c-av { width: 34px; height: 34px; border-radius: 50%; background: #C8A84B; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #2D3A1E; flex-shrink: 0; overflow: hidden; }
.c-av img { width: 100%; height: 100%; object-fit: cover; }
.c-textarea { flex: 1; border: none; background: transparent; font-size: 14px; color: #2D3A1E; outline: none; resize: none; font-family: inherit; line-height: 1.6; min-height: 48px; }
.c-textarea::placeholder { color: #B8A882; }
.compose-bottom { display: flex; justify-content: space-between; align-items: center; padding-top: 10px; border-top: 0.5px solid #EEE8D8; }
.c-count { font-size: 12px; color: #B8A882; }
.btn-post { background: #C8A84B; color: #2D3A1E; border: none; border-radius: 8px; padding: 8px 20px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; transition: opacity 0.15s; }
.btn-post:hover { opacity: 0.85; }
.btn-post:disabled { opacity: 0.4; cursor: not-allowed; }

/* Post */
.post { background: #FDFAF4; border: 0.5px solid #DDD5C0; border-radius: 12px; padding: 14px 16px; transition: border-color 0.15s; }
.post:hover { border-color: #C8A84B; }
.post-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.p-av { width: 34px; height: 34px; border-radius: 50%; background: #C8A84B; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #2D3A1E; flex-shrink: 0; overflow: hidden; }
.p-av img { width: 100%; height: 100%; object-fit: cover; }
.p-name { font-size: 13px; font-weight: 600; color: #2D3A1E; }
.p-handle { font-size: 12px; color: #B8A882; }
.p-time { font-size: 11px; color: #B8A882; margin-left: auto; }
.post-text { font-size: 14px; color: #3D4A2E; line-height: 1.6; margin-bottom: 10px; word-break: break-word; }
.post-actions { display: flex; gap: 16px; }
.p-action { display: flex; align-items: center; gap: 4px; font-size: 12px; color: #B8A882; cursor: pointer; transition: color 0.15s; background: none; border: none; font-family: inherit; padding: 0; }
.p-action:hover { color: #C8A84B; }
.p-action.liked { color: #C8A84B; }
.p-action i { font-size: 14px; }

.empty { text-align: center; padding: 40px 20px; color: #B8A882; font-size: 14px; }

/* Loading */
.loading { text-align: center; padding: 20px; color: #B8A882; font-size: 13px; }
</style>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body>

<div class="sidebar">
  <div class="s-logo">Costax</div>
  <a class="s-item active" href="/"><i class="ti ti-home"></i>Лента</a>
  <a class="s-item" href="/profile.html"><i class="ti ti-user"></i>Профиль</a>
  <div class="s-divider"></div>
  <div class="s-bottom">
    <div class="s-user" onclick="window.location.href='/profile.html'">
      <div class="s-av" id="sidebar-av">М</div>
      <div class="s-info">
        <div class="s-name" id="sidebar-name">Загрузка...</div>
        <div class="s-handle" id="sidebar-handle">@...</div>
      </div>
    </div>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <div class="topbar-title">Лента</div>
    <div class="search-wrap">
      <i class="ti ti-search search-icon"></i>
      <input class="search-inp" type="text" placeholder="Найти @username" id="search-inp" oninput="searchUsers(this.value)" onblur="setTimeout(()=>hideSearch(),200)">
      <div class="search-results" id="search-results"></div>
    </div>
  </div>

  <div class="feed">
    <div class="compose">
      <div class="compose-top">
        <div class="c-av" id="compose-av">М</div>
        <textarea class="c-textarea" id="post-text" placeholder="Что происходит?" oninput="updateCount()" maxlength="280"></textarea>
      </div>
      <div class="compose-bottom">
        <span class="c-count" id="char-count">280</span>
        <button class="btn-post" id="btn-post" onclick="publishPost()">Опубликовать</button>
      </div>
    </div>
    <div id="posts-list"><div class="loading">Загрузка...</div></div>
  </div>
</div>


<!-- Мобильная навигация снизу -->
<nav class="mob-nav">
  <div class="mob-nav-inner">
    <a class="mob-item active" href="/"><i class="ti ti-home"></i>Лента</a>
    <a class="mob-item" href="#"><i class="ti ti-search"></i>Поиск</a>
    <a class="mob-item" href="/profile.html"><i class="ti ti-user"></i>Профиль</a>
  </div>
</nav>

<style>
@media (max-width: 640px) {
  body { overflow: auto; flex-direction: column; height: auto; min-height: 100vh; }
  .sidebar { display: none; }
  .mob-nav { display: block; }
  .main { height: 100vh; padding-bottom: 70px; }
  .feed { max-width: 100%; padding: 12px; }
  .topbar { padding: 12px 14px; }
  .search-inp { width: 130px; }
  .compose { border-radius: 10px; }
  .post { border-radius: 10px; }
}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, orderBy, query, doc, getDoc, getDocs, updateDoc, arrayUnion, arrayRemove, serverTimestamp, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCeveXncaJYszckdflfTVWCDc0AwNilR9k",
  authDomain: "costax-aed53.firebaseapp.com",
  projectId: "costax-aed53",
  storageBucket: "costax-aed53.firebasestorage.app",
  messagingSenderId: "747179946604",
  appId: "1:747179946604:web:073d7faf7d80fb40041e49"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let currentProfile = null;

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = '/login';
    return;
  }
  currentUser = user;
  const profileDoc = await getDoc(doc(db, 'users', user.uid));
  if (!profileDoc.exists()) {
    window.location.href = '/profile.html?setup=1';
    return;
  }
  currentProfile = profileDoc.data();
  updateSidebar();
  loadFeed();
});

function updateSidebar() {
  const p = currentProfile;
  document.getElementById('sidebar-name').textContent = p.name || 'Без имени';
  document.getElementById('sidebar-handle').textContent = '@' + (p.username || '...');
  const initials = (p.name || 'U')[0].toUpperCase();
  const av = document.getElementById('sidebar-av');
  const cav = document.getElementById('compose-av');
  if (p.photoURL) {
    av.innerHTML = `<img src="${p.photoURL}">`;
    cav.innerHTML = `<img src="${p.photoURL}">`;
  } else {
    av.textContent = initials;
    cav.textContent = initials;
  }
}

function loadFeed() {
  const q = query(collection(db, 'posts'), orderBy('createdAt', 'desc'));
  onSnapshot(q, (snap) => {
    const list = document.getElementById('posts-list');
    if (snap.empty) {
      list.innerHTML = '<div class="empty">Пока нет постов — напиши первый!</div>';
      return;
    }
    list.innerHTML = '';
    snap.forEach(d => {
      list.appendChild(renderPost(d.id, d.data()));
    });
  });
}

function renderPost(id, data) {
  const div = document.createElement('div');
  div.className = 'post';
  const liked = data.likes && currentUser && data.likes.includes(currentUser.uid);
  const likesCount = data.likes ? data.likes.length : 0;
  const initials = (data.authorName || 'U')[0].toUpperCase();
  const avatarHtml = data.authorPhoto
    ? `<img src="${data.authorPhoto}">`
    : initials;
  const time = data.createdAt ? timeAgo(data.createdAt.toDate()) : '';
  div.innerHTML = `
    <div class="post-header">
      <div class="p-av">${avatarHtml}</div>
      <div>
        <div class="p-name">${esc(data.authorName || 'Аноним')}</div>
        <div class="p-handle">@${esc(data.authorUsername || 'user')}</div>
      </div>
      <div class="p-time">${time}</div>
    </div>
    <div class="post-text">${esc(data.text)}</div>
    <div class="post-actions">
      <button class="p-action ${liked ? 'liked' : ''}" onclick="toggleLike('${id}', ${liked})">
        <i class="ti ti-heart"></i>${likesCount}
      </button>
    </div>
  `;
  return div;
}

window.publishPost = async function() {
  const text = document.getElementById('post-text').value.trim();
  if (!text || !currentProfile) return;
  const btn = document.getElementById('btn-post');
  btn.disabled = true;
  await addDoc(collection(db, 'posts'), {
    text,
    authorId: currentUser.uid,
    authorName: currentProfile.name,
    authorUsername: currentProfile.username,
    authorPhoto: currentProfile.photoURL || null,
    likes: [],
    createdAt: serverTimestamp()
  });
  document.getElementById('post-text').value = '';
  document.getElementById('char-count').textContent = '280';
  btn.disabled = false;
};

window.toggleLike = async function(postId, isLiked) {
  if (!currentUser) return;
  const ref = doc(db, 'posts', postId);
  if (isLiked) {
    await updateDoc(ref, { likes: arrayRemove(currentUser.uid) });
  } else {
    await updateDoc(ref, { likes: arrayUnion(currentUser.uid) });
  }
};

window.searchUsers = async function(val) {
  const results = document.getElementById('search-results');
  if (!val.trim()) { results.classList.remove('show'); return; }
  const q = query(collection(db, 'users'), where('username', '>=', val.toLowerCase()), where('username', '<=', val.toLowerCase() + '\uf8ff'));
  const snap = await getDocs(q);
  results.innerHTML = '';
  if (snap.empty) { results.classList.remove('show'); return; }
  snap.forEach(d => {
    const u = d.data();
    const initials = (u.name || 'U')[0].toUpperCase();
    const item = document.createElement('div');
    item.className = 's-result';
    item.innerHTML = `<div class="sr-av">${initials}</div><div><div class="sr-name">${esc(u.name)}</div><div class="sr-handle">@${esc(u.username)}</div></div>`;
    results.appendChild(item);
  });
  results.classList.add('show');
};

window.hideSearch = function() {
  document.getElementById('search-results').classList.remove('show');
};

window.updateCount = function() {
  const len = document.getElementById('post-text').value.length;
  document.getElementById('char-count').textContent = 280 - len;
};

function timeAgo(date) {
  const diff = Math.floor((Date.now() - date) / 1000);
  if (diff < 60) return 'только что';
  if (diff < 3600) return Math.floor(diff/60) + ' мин';
  if (diff < 86400) return Math.floor(diff/3600) + ' ч';
  return Math.floor(diff/86400) + ' д';
}

function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
