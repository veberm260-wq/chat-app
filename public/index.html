<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Чат</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f4f4f5;
      --surface: #ffffff;
      --border: #e4e4e7;
      --text: #18181b;
      --muted: #71717a;
      --accent: #7c3aed;
      --accent-dark: #6d28d9;
      --accent-light: #ede9fe;
      --bubble-own: #7c3aed;
      --bubble-other: #ffffff;
      --system: #a1a1aa;
      --online: #22c55e;
    }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }
    
    /* LOGIN */
    #login {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%; gap: 16px; padding: 24px;
    }
    .login-card {
      background: var(--surface); border-radius: 16px; border: 1px solid var(--border);
      padding: 40px 32px; width: 100%; max-width: 360px;
      display: flex; flex-direction: column; align-items: center; gap: 20px;
    }
    .logo { width: 56px; height: 56px; background: var(--accent-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .logo svg { color: var(--accent); }
    .login-card h1 { font-size: 20px; font-weight: 600; }
    .login-card p { font-size: 14px; color: var(--muted); text-align: center; line-height: 1.5; }
    .login-card input {
      width: 100%; padding: 10px 14px; font-size: 15px; border: 1px solid var(--border);
      border-radius: 10px; outline: none; background: var(--bg); color: var(--text);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .login-card input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,58,237,0.15); }
    .login-card button {
      width: 100%; padding: 11px; background: var(--accent); color: white;
      border: none; border-radius: 10px; font-size: 15px; font-weight: 500;
      cursor: pointer; transition: background 0.15s;
    }
    .login-card button:hover { background: var(--accent-dark); }
    .login-card button:disabled { opacity: 0.5; cursor: default; }

    /* CHAT */
    #chat { display: none; flex-direction: column; height: 100%; max-width: 760px; margin: 0 auto; }
    
    .chat-header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 12px 16px; display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .online-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--online); flex-shrink: 0; }
    .header-title { font-size: 15px; font-weight: 600; }
    .header-sub { font-size: 12px; color: var(--muted); margin-top: 1px; }
    .leave-btn {
      padding: 6px 12px; font-size: 13px; color: var(--muted); background: none;
      border: 1px solid var(--border); border-radius: 8px; cursor: pointer; transition: all 0.15s;
    }
    .leave-btn:hover { color: var(--text); border-color: #a1a1aa; }

    .messages {
      flex: 1; overflow-y: auto; padding: 16px 12px;
      display: flex; flex-direction: column; gap: 4px;
      background: var(--bg);
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .empty-state {
      flex: 1; display: flex; align-items: center; justify-content: center;
      font-size: 14px; color: var(--muted);
    }

    .sys-msg {
      text-align: center; font-size: 12px; color: var(--system);
      padding: 6px 0; margin: 4px 0;
    }

    .msg-row { display: flex; gap: 8px; align-items: flex-end; max-width: 75%; }
    .msg-row.own { align-self: flex-end; flex-direction: row-reverse; }
    .msg-row.other { align-self: flex-start; }

    .avatar {
      width: 30px; height: 30px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 600; flex-shrink: 0; letter-spacing: 0.3px;
    }

    .msg-group { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .msg-row.own .msg-group { align-items: flex-end; }
    .sender-label { font-size: 11px; color: var(--muted); padding: 0 4px; margin-bottom: 2px; }

    .bubble-wrap { display: flex; align-items: flex-end; gap: 5px; }
    .msg-row.own .bubble-wrap { flex-direction: row-reverse; }

    .bubble {
      padding: 8px 12px; border-radius: 16px;
      font-size: 14px; line-height: 1.5; word-break: break-word; white-space: pre-wrap;
    }
    .msg-row.other .bubble {
      background: var(--bubble-other); border: 1px solid var(--border);
      color: var(--text); border-bottom-left-radius: 4px;
    }
    .msg-row.own .bubble {
      background: var(--bubble-own); color: white;
      border-bottom-right-radius: 4px;
    }
    .msg-time { font-size: 10px; color: var(--muted); white-space: nowrap; padding-bottom: 2px; flex-shrink: 0; }

    .input-area {
      background: var(--surface); border-top: 1px solid var(--border);
      padding: 12px 16px; display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0;
    }
    .input-area textarea {
      flex: 1; padding: 9px 14px; font-size: 14px; font-family: inherit;
      border: 1px solid var(--border); border-radius: 20px;
      background: var(--bg); color: var(--text); outline: none;
      resize: none; min-height: 38px; max-height: 120px;
      line-height: 1.5; overflow-y: auto; transition: border-color 0.15s, box-shadow 0.15s;
    }
    .input-area textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,58,237,0.15); }
    .send-btn {
      width: 38px; height: 38px; border-radius: 50%; background: var(--accent);
      border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background 0.15s; color: white;
    }
    .send-btn:hover { background: var(--accent-dark); }
    .send-btn:disabled { background: var(--border); color: var(--muted); cursor: default; }

    @media (max-width: 600px) {
      .msg-row { max-width: 88%; }
      .login-card { padding: 32px 20px; }
    }
  </style>
</head>
<body>

<!-- Экран входа -->
<div id="login">
  <div class="login-card">
    <div class="logo">
      <svg width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
      </svg>
    </div>
    <h1>Войти в чат</h1>
    <p>Введи своё имя — остальные увидят его рядом с сообщениями</p>
    <input id="name-input" type="text" placeholder="Твоё имя..." maxlength="24" autocomplete="off" />
    <button id="join-btn" disabled>Войти →</button>
  </div>
</div>

<!-- Экран чата -->
<div id="chat">
  <div class="chat-header">
    <div class="header-left">
      <div class="online-dot"></div>
      <div>
        <div class="header-title">Общий чат</div>
        <div class="header-sub" id="online-label">...</div>
      </div>
    </div>
    <button class="leave-btn" id="leave-btn">Выйти</button>
  </div>
  <div class="messages" id="messages">
    <div class="empty-state" id="empty-state">Пока нет сообщений — напиши первым!</div>
  </div>
  <div class="input-area">
    <textarea id="msg-input" placeholder="Написать сообщение..." rows="1" maxlength="2000"></textarea>
    <button class="send-btn" id="send-btn" disabled aria-label="Отправить">
      <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 19V5m0 0l-7 7m7-7l7 7"/>
      </svg>
    </button>
  </div>
</div>

<script>
const COLORS = [
  { bg:'#ede9fe', text:'#6d28d9' },
  { bg:'#d1fae5', text:'#065f46' },
  { bg:'#fee2e2', text:'#991b1b' },
  { bg:'#dbeafe', text:'#1e40af' },
  { bg:'#fce7f3', text:'#9d174d' },
  { bg:'#fef3c7', text:'#92400e' },
  { bg:'#d1fae5', text:'#065f46' },
  { bg:'#e0f2fe', text:'#075985' },
];

function colorFor(name) {
  let h = 0;
  for (let c of name) h = (h * 31 + c.charCodeAt(0)) % COLORS.length;
  return COLORS[h];
}

function initials(name) {
  return name.trim().split(/\s+/).map(w => w[0]).join('').slice(0, 2).toUpperCase();
}

function fmtTime(ts) {
  return new Date(ts).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
}

// --- DOM ---
const loginEl = document.getElementById('login');
const chatEl = document.getElementById('chat');
const nameInput = document.getElementById('name-input');
const joinBtn = document.getElementById('join-btn');
const messagesEl = document.getElementById('messages');
const emptyState = document.getElementById('empty-state');
const msgInput = document.getElementById('msg-input');
const sendBtn = document.getElementById('send-btn');
const leaveBtn = document.getElementById('leave-btn');
const onlineLabel = document.getElementById('online-label');

let myName = null;
let socket = null;
let unread = 0;
let lastSender = null;

// Автозаполнение имени из localStorage
const saved = localStorage.getItem('chat_username');
if (saved) nameInput.value = saved;
joinBtn.disabled = !saved;

nameInput.addEventListener('input', () => {
  joinBtn.disabled = !nameInput.value.trim();
});
nameInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') joinChat();
});
joinBtn.addEventListener('click', joinChat);

function joinChat() {
  const name = nameInput.value.trim();
  if (!name) return;
  myName = name;
  localStorage.setItem('chat_username', name);

  socket = io({ auth: { name } });

  socket.on('history', (msgs) => {
    messagesEl.innerHTML = '';
    lastSender = null;
    if (msgs.length === 0) {
      messagesEl.appendChild(makeEmpty());
    } else {
      msgs.forEach(appendMessage);
    }
    scrollBottom();
  });

  socket.on('new_message', (msg) => {
    const wasEmpty = !!document.getElementById('empty-state');
    if (wasEmpty) messagesEl.innerHTML = '';
    appendMessage(msg);
    scrollBottom();
    if (document.hidden && msg.sender !== myName) {
      unread++;
      document.title = `(${unread}) Чат`;
    }
  });

  socket.on('user_joined', ({ name }) => {
    appendSystem(`${name} вошёл(а) в чат`);
    scrollBottom();
    lastSender = null;
  });

  socket.on('user_left', ({ name }) => {
    appendSystem(`${name} покинул(а) чат`);
    scrollBottom();
    lastSender = null;
  });

  socket.on('online_count', (n) => {
    onlineLabel.textContent = n === 1 ? '1 участник' : `${n} участника(-ов)`;
  });

  loginEl.style.display = 'none';
  chatEl.style.display = 'flex';
  msgInput.focus();
}

document.addEventListener('visibilitychange', () => {
  if (!document.hidden) {
    unread = 0;
    document.title = 'Чат';
  }
});

leaveBtn.addEventListener('click', () => {
  if (socket) socket.disconnect();
  socket = null;
  myName = null;
  lastSender = null;
  messagesEl.innerHTML = '';
  chatEl.style.display = 'none';
  loginEl.style.display = 'flex';
  nameInput.focus();
  document.title = 'Чат';
});

msgInput.addEventListener('input', () => {
  sendBtn.disabled = !msgInput.value.trim();
  // Авторазмер
  msgInput.style.height = 'auto';
  msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
});

msgInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

sendBtn.addEventListener('click', sendMessage);

function sendMessage() {
  const text = msgInput.value.trim();
  if (!text || !socket) return;
  socket.emit('send_message', { text });
  msgInput.value = '';
  msgInput.style.height = 'auto';
  sendBtn.disabled = true;
}

function makeEmpty() {
  const d = document.createElement('div');
  d.className = 'empty-state';
  d.id = 'empty-state';
  d.textContent = 'Пока нет сообщений — напиши первым!';
  return d;
}

function appendSystem(text) {
  const d = document.createElement('div');
  d.className = 'sys-msg';
  d.textContent = text;
  messagesEl.appendChild(d);
  lastSender = null;
}

function appendMessage(msg) {
  const isOwn = msg.sender === myName;
  const showSender = !isOwn && msg.sender !== lastSender;
  const c = colorFor(msg.sender);
  lastSender = msg.sender;

  const row = document.createElement('div');
  row.className = `msg-row ${isOwn ? 'own' : 'other'}`;

  // Аватар
  const av = document.createElement('div');
  av.className = 'avatar';
  av.style.background = c.bg;
  av.style.color = c.text;
  av.textContent = initials(msg.sender);

  // Группа
  const grp = document.createElement('div');
  grp.className = 'msg-group';

  if (showSender) {
    const lbl = document.createElement('div');
    lbl.className = 'sender-label';
    lbl.textContent = msg.sender;
    grp.appendChild(lbl);
  }

  const wrap = document.createElement('div');
  wrap.className = 'bubble-wrap';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = msg.text;

  const time = document.createElement('div');
  time.className = 'msg-time';
  time.textContent = fmtTime(msg.ts);

  wrap.appendChild(bubble);
  wrap.appendChild(time);
  grp.appendChild(wrap);

  row.appendChild(av);
  row.appendChild(grp);
  messagesEl.appendChild(row);
}

function scrollBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}
</script>
</body>
</html>
