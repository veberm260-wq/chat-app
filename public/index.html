<script>
let starsRunning = false;
function initStars() {
  const canvas = document.getElementById('stars-canvas');
  const ctx = canvas.getContext('2d');
  let stars = [];
  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  function createStars() {
    stars = [];
    for (let i = 0; i < 200; i++) {
      stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*1.2+0.2, speed: 0.003+Math.random()*0.008, phase: Math.random()*Math.PI*2 });
    }
  }
  function draw(t) {
    if (!document.body.classList.contains('dark')) { starsRunning = false; return; }
    ctx.clearRect(0,0,canvas.width,canvas.height);
    stars.forEach(s => {
      const a = 0.15 + 0.65*(0.5+0.5*Math.sin(t*s.speed+s.phase));
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle = `rgba(255,255,255,${a})`; ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  window._startStars = function() {
    if (starsRunning) return;
    starsRunning = true;
    requestAnimationFrame(draw);
  };
  resize(); createStars();
  window.addEventListener('resize', () => { resize(); createStars(); });
}
initStars();

let isDark = false;
function toggleTheme() {
  isDark = !isDark;
  document.body.className = isDark ? 'dark' : 'light';
  document.getElementById('theme-icon').className = isDark ? 'ti ti-sun' : 'ti ti-moon';
  document.getElementById('theme-label').textContent = isDark ? 'Светлая тема' : 'Тёмная тема';
  document.getElementById('toggle-pill').style.background = isDark ? '#1D9BF0' : '#E7E9EA';
  document.getElementById('toggle-dot').style.left = isDark ? '20px' : '2px';
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
  if (isDark) window._startStars && window._startStars();
}
if (localStorage.getItem('theme') === 'dark') toggleTheme();
</script>

const commentUnsubs = {};

// Twitter-style verified badge SVG
const badgeSvg = `<span class="verified"><svg viewBox="0 0 24 24" aria-label="Подтверждённый аккаунт"><g><path d="M22.25 12c0-1.43-.88-2.67-2.19-3.34.46-1.39.2-2.9-.81-3.91s-2.52-1.27-3.91-.81c-.66-1.31-1.91-2.19-3.34-2.19s-2.67.88-3.33 2.19c-1.4-.46-2.91-.2-3.92.81s-1.26 2.52-.8 3.91c-1.31.67-2.2 1.91-2.2 3.34s.89 2.67 2.2 3.34c-.46 1.39-.21 2.9.8 3.91s2.52 1.26 3.91.81c.67 1.31 1.91 2.19 3.34 2.19s2.68-.88 3.34-2.19c1.39.45 2.9.2 3.91-.81s1.27-2.52.81-3.91c1.31-.67 2.19-1.91 2.19-3.34zm-11.71 4.2L6.8 12.46l1.41-1.42 2.26 2.26 4.8-5.23 1.47 1.36-6.2 6.77z" fill="#1D9BF0"/></g></svg></span>`;

function watchUnreadBadge(uid) {
  const q = query(collection(db,'chats'), where('members','array-contains',uid));
  onSnapshot(q, snap => {
    let total = 0;
    snap.forEach(d => { total += (d.data().unread && d.data().unread[uid]) || 0; });
    const badge = document.getElementById('nav-unread-badge');
    if (badge) { badge.textContent = total > 99 ? '99+' : total; badge.style.display = total > 0 ? 'block' : 'none'; }
  });
}

onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.href = '/login'; return; }
  me = user;
  watchUnreadBadge(user.uid);
  const pd = await getDoc(doc(db,'users',user.uid));
  if (!pd.exists()) { window.location.href = '/profile.html?setup=1'; return; }
  myProfile = pd.data();
  const init = (myProfile.name||'U')[0].toUpperCase();
  document.getElementById('sidebar-av').textContent = init;
  document.getElementById('sidebar-name').textContent = myProfile.name||'';
  document.getElementById('sidebar-handle').textContent = '@'+(myProfile.username||'');
  document.getElementById('compose-av').textContent = init;
  loadFeed();
  loadUsers();
});

function loadFeed() {
  const q = query(collection(db,'posts'), orderBy('createdAt','desc'), limit(50));
  onSnapshot(q, snap => {
    document.getElementById('post-count').textContent = snap.size + ' постов';
    const list = document.getElementById('posts-list');
    if (snap.empty) { list.innerHTML = '<div class="empty">Пока нет постов!</div>'; return; }
    list.innerHTML = '';
    snap.forEach(d => list.appendChild(renderPost(d.id, d.data())));
  });
}

function renderPost(id, data) {
  const liked = data.likes?.includes(me?.uid);
  const count = data.likes?.length || 0;
  const commCount = data.commentCount || 0;
  const init = (data.authorName||'U')[0].toUpperCase();
  const time = data.createdAt ? timeAgo(data.createdAt.toDate()) : '';
  const isOwn = data.authorId === me?.uid;
  const myInit = (myProfile?.name||'U')[0].toUpperCase();

  const deleteBtn = isOwn ? `
    <button class="p-action p-del" onclick="deletePost('${id}')" title="Удалить">
      <i class="ti ti-trash"></i>
    </button>` : '';

  const div = document.createElement('div');
  div.className = 'post';
  div.id = 'post-'+id;
  div.innerHTML = `
    <div class="p-av" onclick="viewUser('${data.authorId}')">${init}</div>
    <div class="p-body">
      <div class="p-name-row" onclick="viewUser('${data.authorId}')">
        <span class="p-name">${esc(data.authorName||'Аноним')}</span>
        ${badgeSvg}
        <span class="p-handle">@${esc(data.authorUsername||'user')}</span>
        <span class="p-dot">·</span>
        <span class="p-time">${time}</span>
      </div>
      <div class="post-text">${esc(data.text)}</div>
      <div class="post-actions">
        <button class="p-action ${liked?'liked':''}" onclick="toggleLike('${id}',${liked})">
          <i class="ti ti-heart"></i>${count > 0 ? `<span class="p-action-count">${count}</span>` : ''}
        </button>
        <button class="p-action" onclick="toggleComments('${id}')">
          <i class="ti ti-message-circle"></i>${commCount > 0 ? `<span class="p-action-count">${commCount}</span>` : ''}
        </button>
        <button class="p-action" onclick="msgUser('${data.authorId}')">
          <i class="ti ti-send"></i>
        </button>
        <button class="p-action" onclick="">
          <i class="ti ti-bookmark"></i>
        </button>
        ${deleteBtn}
      </div>
      <div class="comments-section" id="comments-${id}">
        <div id="comments-list-${id}"></div>
        <div class="cm-input-row">
          <div class="cm-av-s">${myInit}</div>
          <input class="cm-input" id="cm-inp-${id}" placeholder="Комментарий..." onkeydown="if(event.key==='Enter')addComment('${id}')">
          <button class="cm-send" onclick="addComment('${id}')"><i class="ti ti-send"></i></button>
        </div>
      </div>
    </div>`;
  return div;
}

window.deletePost = async function(id) {
  if (!confirm('Удалить пост?')) return;
  await deleteDoc(doc(db,'posts',id));
};

window.toggleComments = async function(id) {
  const s = document.getElementById('comments-'+id);
  s.classList.toggle('open');
  if (s.classList.contains('open')) { loadComments(id); document.getElementById('cm-inp-'+id)?.focus(); }
};

async function loadComments(postId) {
  if (commentUnsubs[postId]) return;
  const q = query(collection(db,'posts',postId,'comments'), orderBy('createdAt','asc'));
  commentUnsubs[postId] = onSnapshot(q, snap => {
    const list = document.getElementById('comments-list-'+postId);
    if (!list) return;
    list.innerHTML = '';
    snap.forEach(d => {
      const c = d.data();
      const div = document.createElement('div');
      div.className = 'comment';
      div.innerHTML = `
        <div class="cm-av" onclick="viewUser('${c.authorId}')">${(c.authorName||'U')[0].toUpperCase()}</div>
        <div class="cm-body">
          <div class="cm-name" onclick="viewUser('${c.authorId}')">${esc(c.authorName||'Аноним')} ${badgeSvg}</div>
          <div class="cm-text">${esc(c.text)}</div>
        </div>`;
      list.appendChild(div);
    });
  });
}

window.addComment = async function(postId) {
  const inp = document.getElementById('cm-inp-'+postId);
  const text = inp?.value.trim();
  if (!text || !myProfile) return;
  inp.value = '';
  await addDoc(collection(db,'posts',postId,'comments'), {
    text, authorId: me.uid, authorName: myProfile.name,
    authorUsername: myProfile.username, createdAt: serverTimestamp()
  });
  const pd = await getDoc(doc(db,'posts',postId));
  await updateDoc(doc(db,'posts',postId), { commentCount: (pd.data()?.commentCount||0) + 1 });
};

async function loadUsers() {
  const snap = await getDocs(query(collection(db,'users'), limit(10)));
  const list = document.getElementById('users-list');
  list.innerHTML = '';
  snap.forEach(d => {
    if (d.id === me?.uid) return;
    const u = d.data();
    const div = document.createElement('div');
    div.className = 'r-user';
    div.innerHTML = `<div class="ru-av">${(u.name||'U')[0].toUpperCase()}</div><div><div class="ru-name">${esc(u.name)}${badgeSvg}</div><div class="ru-handle">@${esc(u.username)}</div></div>`;
    div.onclick = () => window.location.href = '/user.html?uid='+d.id;
    list.appendChild(div);
  });
}

window.viewUser = function(uid) { if (!uid) return; window.location.href = '/user.html?uid='+uid; };
window.msgUser = function(uid) { if (!uid || uid === me?.uid) return; window.location.href = '/messages.html?uid='+uid; };

window.publishPost = async function() {
  const text = document.getElementById('post-text').value.trim();
  if (!text || !myProfile) return;
  const btn = document.getElementById('btn-post');
  btn.disabled = true;
  await addDoc(collection(db,'posts'), {
    text, authorId: me.uid, authorName: myProfile.name,
    authorUsername: myProfile.username, likes: [], commentCount: 0,
    createdAt: serverTimestamp()
  });
  document.getElementById('post-text').value = '';
  document.getElementById('char-count').textContent = '280';
  btn.disabled = false;
};

window.toggleLike = async function(id, liked) {
  if (!me) return;
  const ref = doc(db,'posts',id);
  if (liked) await updateDoc(ref, {likes: arrayRemove(me.uid)});
  else await updateDoc(ref, {likes: arrayUnion(me.uid)});
};

window.searchUsers = async function(val) {
  const dd = document.getElementById('search-dropdown');
  if (!val.trim()) { dd.classList.remove('show'); return; }
  const q = query(collection(db,'users'), where('username','>=',val.toLowerCase()), where('username','<=',val.toLowerCase()+'\uf8ff'), limit(6));
  const snap = await getDocs(q);
  dd.innerHTML = '';
  snap.forEach(d => {
    const u = d.data();
    const div = document.createElement('div');
    div.className = 'sd-item';
    div.innerHTML = `<div class="ru-av" style="width:32px;height:32px;font-size:12px">${(u.name||'U')[0].toUpperCase()}</div><div><div style="font-size:14px;font-weight:800">${esc(u.name)}${badgeSvg}</div><div style="font-size:13px;color:#536471">@${esc(u.username)}</div></div>`;
    div.onclick = () => window.location.href = '/user.html?uid='+d.id;
    dd.appendChild(div);
  });
  dd.classList.toggle('show', !snap.empty);
};
window.hideSearch = () => document.getElementById('search-dropdown').classList.remove('show');
window.updateCount = () => document.getElementById('char-count').textContent = 280 - document.getElementById('post-text').value.length;

function timeAgo(d) {
  const s = Math.floor((Date.now()-d)/1000);
  if (s<60) return 'только что';
  if (s<3600) return Math.floor(s/60)+' мин';
  if (s<86400) return Math.floor(s/3600)+' ч';
  return Math.floor(s/86400)+' д';
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>

if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
