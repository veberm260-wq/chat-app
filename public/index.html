<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Costax</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/icon-180.png">
<meta name="theme-color" content="#1D9BF0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',-apple-system,sans-serif;height:100vh;height:100dvh;overflow:hidden;transition:background .3s,color .3s}
body.light{background:#fff;color:#0F1419}
body.dark{background:#000;color:#E7E9EA}
#stars-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;display:none}
body.dark #stars-canvas{display:block}

/* ── LAYOUT ── */
#app{display:flex;height:100dvh;overflow:hidden;position:relative;z-index:1}
.sidebar{width:220px;min-width:220px;height:100dvh;display:flex;flex-direction:column;padding:8px 12px 16px;position:relative;z-index:10;transition:background .3s,border-color .3s}
body.light .sidebar{background:#fff;border-right:1px solid #EFF3F4}
body.dark .sidebar{background:#000;border-right:1px solid #2F3336}
.main{flex:1;display:flex;overflow:hidden}

/* ── SIDEBAR ── */
.s-logo{display:flex;align-items:center;gap:10px;padding:12px 12px 20px}
.s-logo-icon{width:34px;height:34px;background:#1D9BF0;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.s-logo-text{font-size:20px;font-weight:800;letter-spacing:-.03em;transition:color .3s}
body.light .s-logo-text{color:#0F1419}
body.dark .s-logo-text{color:#E7E9EA}
.s-item{display:flex;align-items:center;gap:16px;padding:12px 16px;border-radius:9999px;font-size:17px;font-weight:700;cursor:pointer;transition:background .15s,color .15s;text-decoration:none}
body.light .s-item{color:#0F1419}
body.dark .s-item{color:#E7E9EA}
body.light .s-item:hover{background:#E7E9EA}
body.dark .s-item:hover{background:#181818}
.s-item.active{color:#1D9BF0}
.s-item i{font-size:22px}
.s-divider{height:1px;margin:8px 0;transition:background .3s}
body.light .s-divider{background:#EFF3F4}
body.dark .s-divider{background:#2F3336}
.s-bottom{margin-top:auto}
.s-user{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9999px;cursor:pointer;transition:background .15s}
body.light .s-user:hover{background:#E7E9EA}
body.dark .s-user:hover{background:#181818}
.s-av{width:38px;height:38px;border-radius:50%;background:#1D9BF0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;flex-shrink:0}
.s-uname{font-size:14px;font-weight:800;transition:color .3s}
body.light .s-uname{color:#0F1419}
body.dark .s-uname{color:#E7E9EA}
.s-uhandle{font-size:13px;transition:color .3s}
body.light .s-uhandle{color:#536471}
body.dark .s-uhandle{color:#71767B}
.theme-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:9999px;cursor:pointer;font-size:15px;font-weight:700;transition:background .15s;margin-top:4px}
body.light .theme-row{color:#0F1419}
body.dark .theme-row{color:#E7E9EA}
body.light .theme-row:hover{background:#E7E9EA}
body.dark .theme-row:hover{background:#181818}
.theme-row i{font-size:20px}
.toggle-pill{width:42px;height:24px;border-radius:12px;position:relative;margin-left:auto;transition:background .25s;flex-shrink:0}
.toggle-dot{width:20px;height:20px;border-radius:50%;background:#fff;position:absolute;top:2px;transition:left .25s;box-shadow:0 1px 3px rgba(0,0,0,.3)}

/* ── MOBILE NAV ── */
.mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:100;transition:all .3s}
body.light .mob-nav{background:rgba(255,255,255,.95);border-top:1px solid #EFF3F4}
body.dark .mob-nav{background:rgba(0,0,0,.95);border-top:1px solid #2F3336}
.mob-nav-inner{display:flex;justify-content:space-around;align-items:center;padding:8px 0 max(8px,env(safe-area-inset-bottom));min-height:56px}
.mob-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 16px;text-decoration:none;font-size:10px;font-weight:700;cursor:pointer;transition:color .3s}
body.light .mob-item{color:#536471}
body.dark .mob-item{color:#71767B}
.mob-item.active{color:#1D9BF0}
.mob-item i{font-size:22px}
.nav-badge{position:absolute;top:-2px;right:-6px;background:#1D9BF0;color:#fff;border-radius:9999px;font-size:9px;font-weight:800;padding:1px 4px;min-width:14px;text-align:center;line-height:14px}

/* ── TOPBAR ── */
.topbar{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;backdrop-filter:blur(12px);position:sticky;top:0;z-index:5;transition:all .3s}
body.light .topbar{background:rgba(255,255,255,.85);border-bottom:1px solid #EFF3F4}
body.dark .topbar{background:rgba(0,0,0,.85);border-bottom:1px solid #2F3336}
.topbar-title{font-size:17px;font-weight:800;letter-spacing:-.02em}
.back-btn{background:none;border:none;cursor:pointer;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;transition:background .15s}
body.light .back-btn{color:#0F1419}
body.dark .back-btn{color:#E7E9EA}
body.light .back-btn:hover{background:#E7E9EA}
body.dark .back-btn:hover{background:#181818}

/* ── FEED ── */
.feed-col{flex:1;display:flex;flex-direction:column;overflow:hidden}
body.light .feed-col{border-right:1px solid #EFF3F4}
body.dark .feed-col{border-right:1px solid #2F3336}
.feed{flex:1;overflow-y:auto}
.post-count{font-size:13px;transition:color .3s}
body.light .post-count{color:#536471}
body.dark .post-count{color:#71767B}
.compose{padding:12px 16px;display:flex;gap:12px;transition:border-color .3s}
body.light .compose{border-bottom:1px solid #EFF3F4}
body.dark .compose{border-bottom:1px solid #2F3336}
.c-av{width:40px;height:40px;border-radius:50%;background:#1D9BF0;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#fff;flex-shrink:0}
.compose-right{flex:1}
.c-textarea{width:100%;border:none;background:transparent;font-size:18px;font-weight:500;outline:none;resize:none;font-family:inherit;line-height:1.5;min-height:56px;transition:color .3s}
body.light .c-textarea{color:#0F1419}
body.dark .c-textarea{color:#E7E9EA}
body.light .c-textarea::placeholder{color:#536471}
body.dark .c-textarea::placeholder{color:#71767B}
.compose-bottom{display:flex;justify-content:space-between;align-items:center;padding-top:10px;transition:border-color .3s}
body.light .compose-bottom{border-top:1px solid #EFF3F4}
body.dark .compose-bottom{border-top:1px solid #2F3336}
.c-count{font-size:13px;font-weight:700;transition:color .3s}
body.light .c-count{color:#536471}
body.dark .c-count{color:#71767B}
.btn-post{background:#1D9BF0;color:#fff;border:none;border-radius:9999px;padding:8px 20px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;transition:background .15s}
.btn-post:hover{background:#1A8CD8}
.btn-post:disabled{opacity:.5;cursor:not-allowed}
.post{padding:12px 16px;display:flex;gap:12px;transition:background .1s,border-color .3s;cursor:pointer}
body.light .post{border-bottom:1px solid #EFF3F4}
body.dark .post{border-bottom:1px solid #2F3336}
body.light .post:hover{background:#F7F9F9}
body.dark .post:hover{background:#080808}
.p-av{width:40px;height:40px;border-radius:50%;background:#1D9BF0;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#fff;flex-shrink:0;cursor:pointer}
.p-body{flex:1;min-width:0}
.p-name-row{display:flex;align-items:center;gap:4px;margin-bottom:2px;flex-wrap:wrap}
.p-name{font-size:15px;font-weight:800;transition:color .15s}
body.light .p-name{color:#0F1419}
body.dark .p-name{color:#E7E9EA}
.p-name-row:hover .p-name{color:#1D9BF0}
.p-handle{font-size:14px;transition:color .3s}
body.light .p-handle{color:#536471}
body.dark .p-handle{color:#71767B}
.p-dot,.p-time{font-size:14px;transition:color .3s}
body.light .p-dot,.p-time{color:#536471}
body.dark .p-dot,.p-time{color:#71767B}
.post-text{font-size:15px;font-weight:500;line-height:1.6;margin-bottom:10px;word-break:break-word;transition:color .3s}
body.light .post-text{color:#0F1419}
body.dark .post-text{color:#E7E9EA}
.post-actions{display:flex;gap:0;margin:0 -8px}
.p-action{display:flex;align-items:center;gap:6px;padding:8px;border-radius:9999px;cursor:pointer;border:none;background:none;font-family:inherit;font-size:13px;font-weight:700;transition:color .15s}
body.light .p-action{color:#536471}
body.dark .p-action{color:#71767B}
.p-action:hover{color:#1D9BF0;background:rgba(29,155,240,.1)}
.p-action.liked{color:#F91880}
.p-action.liked:hover{color:#F91880;background:rgba(249,24,128,.1)}
.p-action i{font-size:18px}
.p-del:hover{color:#F4212E!important;background:rgba(244,33,46,.1)!important}
.p-del{margin-left:auto}
.comments-section{margin-top:8px;display:none}
.comments-section.open{display:block}
.comment{display:flex;gap:8px;margin-bottom:8px}
.cm-av{width:28px;height:28px;border-radius:50%;background:#1D9BF0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0;cursor:pointer}
.cm-body{flex:1;border-radius:12px;padding:8px 12px;transition:all .3s}
body.light .cm-body{background:#F7F9F9}
body.dark .cm-body{background:#16181C}
.cm-name{font-size:13px;font-weight:800;margin-bottom:2px;cursor:pointer;transition:color .3s}
body.light .cm-name{color:#0F1419}
body.dark .cm-name{color:#E7E9EA}
.cm-name:hover{color:#1D9BF0}
.cm-text{font-size:13px;font-weight:500;line-height:1.5;transition:color .3s}
body.light .cm-text{color:#0F1419}
body.dark .cm-text{color:#E7E9EA}
.cm-input-row{display:flex;gap:8px;align-items:center;margin-top:8px}
.cm-av-s{width:28px;height:28px;border-radius:50%;background:#1D9BF0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0}
.cm-input{flex:1;border-radius:9999px;padding:8px 14px;font-size:14px;font-weight:600;outline:none;font-family:inherit;transition:all .3s}
body.light .cm-input{border:1px solid #EFF3F4;background:#F7F9F9;color:#0F1419}
body.dark .cm-input{border:1px solid #2F3336;background:#16181C;color:#E7E9EA}
.cm-input::placeholder{color:#536471}
.cm-input:focus{border-color:#1D9BF0}
.cm-send{width:30px;height:30px;border-radius:50%;background:#1D9BF0;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center}
.cm-send i{font-size:14px;color:#fff}
.verified{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;flex-shrink:0}
.verified svg{width:18px;height:18px}
.empty{padding:40px 20px;text-align:center;font-size:15px;font-weight:600;transition:color .3s}
body.light .empty{color:#536471}
body.dark .empty{color:#71767B}

/* ── RIGHT PANEL ── */
.right-panel{width:290px;min-width:290px;padding:12px;display:flex;flex-direction:column;gap:12px;overflow-y:auto}
.r-search{display:flex;align-items:center;gap:10px;border-radius:9999px;padding:10px 16px;transition:all .3s}
body.light .r-search{background:#EFF3F4}
body.dark .r-search{background:#202327}
.r-search input{flex:1;border:none;background:transparent;font-size:15px;font-weight:600;outline:none;font-family:inherit;transition:color .3s}
body.light .r-search input{color:#0F1419}
body.dark .r-search input{color:#E7E9EA}
.r-search input::placeholder{color:#536471}
.r-search i{font-size:16px;color:#536471}
.search-dropdown{border-radius:12px;padding:6px;display:none;overflow:hidden;transition:all .3s}
body.light .search-dropdown{background:#fff;border:1px solid #EFF3F4;box-shadow:0 4px 16px rgba(0,0,0,.08)}
body.dark .search-dropdown{background:#1E1E1E;border:1px solid #2F3336}
.search-dropdown.show{display:block}
.r-card{border-radius:16px;padding:12px 16px;transition:all .3s}
body.light .r-card{background:#F7F9F9}
body.dark .r-card{background:#16181C}
.r-card-title{font-size:18px;font-weight:800;margin-bottom:12px;letter-spacing:-.02em}
.r-user{display:flex;align-items:center;gap:10px;padding:8px 0;cursor:pointer;border-radius:8px}
.r-user:hover .ru-name{color:#1D9BF0}
.ru-av{width:38px;height:38px;border-radius:50%;background:#1D9BF0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0}
.ru-name{font-size:15px;font-weight:800;display:flex;align-items:center;gap:4px;transition:color .15s}
.ru-handle{font-size:13px;transition:color .3s}
body.light .ru-handle{color:#536471}
body.dark .ru-handle{color:#71767B}
.sd-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer}
body.light .sd-item:hover{background:#F7F9F9}
body.dark .sd-item:hover{background:#1E1E1E}

/* ── MESSAGES ── */
.msgs-wrap{flex:1;display:flex;overflow:hidden}
.chats-panel{width:300px;min-width:300px;display:flex;flex-direction:column;transition:border-color .3s}
body.light .chats-panel{border-right:1px solid #EFF3F4;background:#fff}
body.dark .chats-panel{border-right:1px solid #2F3336;background:#000}
.chats-top{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;transition:all .3s}
body.light .chats-top{border-bottom:1px solid #EFF3F4}
body.dark .chats-top{border-bottom:1px solid #2F3336}
.chats-title{font-size:17px;font-weight:800;transition:color .3s}
body.light .chats-title{color:#0F1419}
body.dark .chats-title{color:#E7E9EA}
.btn-new{background:#1D9BF0;color:#fff;border:none;border-radius:9999px;padding:7px 16px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit}
.btn-new:hover{background:#1A8CD8}
.search-chat{padding:8px 14px;flex-shrink:0;transition:border-color .3s}
body.light .search-chat{border-bottom:1px solid #EFF3F4}
body.dark .search-chat{border-bottom:1px solid #2F3336}
.search-chat-inp{width:100%;border-radius:9999px;padding:9px 16px;font-size:14px;font-weight:600;outline:none;font-family:inherit;transition:all .3s}
body.light .search-chat-inp{border:none;background:#EFF3F4;color:#0F1419}
body.dark .search-chat-inp{border:none;background:#202327;color:#E7E9EA}
.search-chat-inp::placeholder{color:#536471}
.chats-list{flex:1;overflow-y:auto}
.chat-item{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;transition:background .1s,border-color .3s}
body.light .chat-item{border-bottom:1px solid #EFF3F4}
body.dark .chat-item{border-bottom:1px solid #2F3336}
body.light .chat-item:hover{background:#F7F9F9}
body.dark .chat-item:hover{background:#080808}
.chat-item.active{background:rgba(29,155,240,.08)}
.ci-av{width:44px;height:44px;border-radius:50%;background:#1D9BF0;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff;flex-shrink:0}
.ci-info{flex:1;overflow:hidden}
.ci-name{font-size:14px;font-weight:800;transition:color .3s}
body.light .ci-name{color:#0F1419}
body.dark .ci-name{color:#E7E9EA}
.ci-last{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;transition:color .3s}
body.light .ci-last{color:#536471}
body.dark .ci-last{color:#71767B}
.ci-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.ci-time{font-size:12px;transition:color .3s}
body.light .ci-time{color:#536471}
body.dark .ci-time{color:#71767B}
.ci-badge{background:#1D9BF0;color:#fff;border-radius:9999px;font-size:11px;font-weight:800;padding:2px 7px;min-width:20px;text-align:center;flex-shrink:0}
.empty-chats{padding:40px 20px;text-align:center;font-size:14px;font-weight:600;line-height:1.8;transition:color .3s}
body.light .empty-chats{color:#536471}
body.dark .empty-chats{color:#71767B}
.chat-window{flex:1;display:flex;flex-direction:column;transition:background .3s}
#chat-active{min-height:0}
body.light .chat-window{background:#fff}
body.dark .chat-window{background:#000}
.chat-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;font-size:15px;font-weight:600;transition:color .3s}
body.light .chat-empty{color:#536471}
body.dark .chat-empty{color:#71767B}
.chat-empty i{font-size:44px;opacity:.4}
.chat-header{padding:13px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;backdrop-filter:blur(12px);transition:all .3s}
body.light .chat-header{background:rgba(255,255,255,.9);border-bottom:1px solid #EFF3F4}
body.dark .chat-header{background:rgba(0,0,0,.9);border-bottom:1px solid #2F3336}
.ch-av{width:36px;height:36px;border-radius:50%;background:#1D9BF0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;flex-shrink:0}
.ch-name{font-size:15px;font-weight:800;display:flex;align-items:center;gap:6px;transition:color .3s}
body.light .ch-name{color:#0F1419}
body.dark .ch-name{color:#E7E9EA}
.ch-handle{font-size:13px;transition:color .3s}
body.light .ch-handle{color:#536471}
body.dark .ch-handle{color:#71767B}
.chat-messages{flex:1;min-height:0;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px}
.msg{max-width:70%}
.msg.mine{align-self:flex-end}
.msg.theirs{align-self:flex-start}
.msg-bubble{padding:10px 14px;border-radius:18px;font-size:14px;font-weight:500;line-height:1.5;word-break:break-word}
.msg.mine .msg-bubble{background:#1D9BF0;color:#fff;border-bottom-right-radius:4px}
.msg.theirs .msg-bubble{border-bottom-left-radius:4px;transition:background .3s,color .3s}
body.light .msg.theirs .msg-bubble{background:#EFF3F4;color:#0F1419}
body.dark .msg.theirs .msg-bubble{background:#202327;color:#E7E9EA}
.msg-time{font-size:11px;margin-top:3px;font-weight:600;transition:color .3s}
body.light .msg-time{color:#536471}
body.dark .msg-time{color:#71767B}
.msg.mine .msg-time{text-align:right}
.chat-input-wrap{padding:12px 16px;display:flex;gap:10px;align-items:flex-end;flex-shrink:0;transition:all .3s}
body.light .chat-input-wrap{border-top:1px solid #EFF3F4;background:#fff}
body.dark .chat-input-wrap{border-top:1px solid #2F3336;background:#000}
.chat-input{flex:1;border-radius:9999px;padding:10px 16px;font-size:14px;font-weight:600;outline:none;resize:none;font-family:inherit;max-height:120px;line-height:1.5;transition:all .3s}
body.light .chat-input{border:1px solid #CFD9DE;background:#fff;color:#0F1419}
body.dark .chat-input{border:1px solid #2F3336;background:#16181C;color:#E7E9EA}
.chat-input::placeholder{color:#536471}
.chat-input:focus{border-color:#1D9BF0}
.btn-send{width:38px;height:38px;border-radius:50%;background:#1D9BF0;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
.btn-send:hover{background:#1A8CD8}
.btn-send i{font-size:17px;color:#fff}
.chat-back-btn{background:none;border:none;cursor:pointer;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;display:none;transition:all .15s}
body.light .chat-back-btn{color:#0F1419}
body.dark .chat-back-btn{color:#E7E9EA}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{border-radius:16px;width:100%;max-width:360px;padding:24px;transition:all .3s}
body.light .modal{background:#fff;border:1px solid #EFF3F4;box-shadow:0 8px 32px rgba(0,0,0,.1)}
body.dark .modal{background:#16181C;border:1px solid #2F3336}

<script>
// ── STARS ──
let starsRunning = false;
function initStars() {
  const canvas = document.getElementById('stars-canvas');
  const ctx = canvas.getContext('2d');
  let stars = [];
  function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
  function createStars() {
    stars = [];
    for (let i = 0; i < 200; i++) stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*1.2+0.2, speed: 0.003+Math.random()*0.008, phase: Math.random()*Math.PI*2 });
  }
  function draw(t) {
    if (!document.body.classList.contains('dark')) { starsRunning = false; return; }
    ctx.clearRect(0,0,canvas.width,canvas.height);
    stars.forEach(s => { const a = 0.15+0.65*(0.5+0.5*Math.sin(t*s.speed+s.phase)); ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fillStyle=`rgba(255,255,255,${a})`; ctx.fill(); });
    requestAnimationFrame(draw);
  }
  window._startStars = function() { if (starsRunning) return; starsRunning = true; requestAnimationFrame(draw); };
  resize(); createStars();
  window.addEventListener('resize', () => { resize(); createStars(); });
}
initStars();

// ── THEME ──
let isDark = false;
function toggleTheme() {
  isDark = !isDark;
  document.body.className = isDark ? 'dark' : 'light';
  document.getElementById('theme-icon').className = isDark ? 'ti ti-sun' : 'ti ti-moon';
  document.getElementById('theme-label').textContent = isDark ? 'Светлая тема' : 'Тёмная тема';
  document.getElementById('toggle-pill').style.background = isDark ? '#1D9BF0' : '#E7E9EA';
  document.getElementById('toggle-dot').style.left = isDark ? '20px' : '2px';
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
  if (isDark) window._startStars && window._startStars();
}
if (localStorage.getItem('theme') === 'dark') toggleTheme();

// ── LOGIN UI ──
window.switchTab = function(tab) {
  ['login','reg'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('active', t === tab);
    document.getElementById('screen-'+t).classList.toggle('active', t === tab);
  });
};
</script>

// ── ROUTER ──
function currentRoute() {
  const h = location.hash.slice(1) || '/';
  return h;
}
window.go = function(path) {
  location.hash = path;
};
function updateNavActive(path) {
  const base = path.split('/')[1] || '';
  ['home','msgs','prof'].forEach(id => {
    document.getElementById('nav-'+id)?.classList.remove('active');
    document.getElementById('mob-'+id)?.classList.remove('active');
  });
  const map = { '': 'home', 'messages': 'msgs', 'profile': 'prof' };
  const key = map[base];
  if (key) {
    document.getElementById('nav-'+key)?.classList.add('active');
    document.getElementById('mob-'+key)?.classList.add('active');
  }
}
function cleanup() {
  cleanupFns.forEach(fn => { try { fn(); } catch(e) {} });
  cleanupFns = [];
}

window.addEventListener('hashchange', () => route());

function route() {
  if (!me) return;
  cleanup();
  const path = currentRoute();
  updateNavActive(path);
  const parts = path.split('/').filter(Boolean);
  const page = parts[0] || '';
  const param = parts[1] || '';

  if (page === 'messages') renderMessages(param || null);
  else if (page === 'profile') renderProfile();
  else if (page === 'user' && param) renderUser(param);
  else renderFeed();
}

// ── AUTH ──
onAuthStateChanged(auth, async user => {
  if (!user) {
    document.getElementById('app').style.display = 'none';
    document.getElementById('login-page').style.display = 'flex';
    return;
  }
  me = user;
  document.getElementById('login-page').style.display = 'none';

  const pd = await getDoc(doc(db,'users',user.uid));
  if (!pd.exists()) {
    document.getElementById('app').style.display = 'flex';
    renderProfileSetup();
    return;
  }
  myProfile = pd.data();
  updateSidebar();
  document.getElementById('app').style.display = 'flex';

  updateDoc(doc(db,'users',me.uid), { isOnline: true }).catch(() => {});
  watchUnreadBadge();
  showNotificationButtonIfNeeded();
  if ('Notification' in window && Notification.permission === 'granted') setTimeout(requestFCMToken, 2000);
  route();
});

window.addEventListener('beforeunload', () => {
  if (me) updateDoc(doc(db,'users',me.uid), { isOnline: false }).catch(() => {});
});

function updateSidebar() {
  if (!myProfile) return;
  const init = (myProfile.name||'U')[0].toUpperCase();
  document.getElementById('sidebar-av').textContent = init;
  document.getElementById('sidebar-name').textContent = myProfile.name||'';
  document.getElementById('sidebar-handle').textContent = '@'+(myProfile.username||'');
}

function watchUnreadBadge() {
  const q = query(collection(db,'chats'), where('members','array-contains',me.uid));
  const unsub = onSnapshot(q, snap => {
    let total = 0;
    snap.forEach(d => { total += (d.data().unread && d.data().unread[me.uid]) || 0; });
    const mob = document.getElementById('mob-badge');
    const sid = document.getElementById('sidebar-badge');
    [mob, sid].forEach(el => { if (!el) return; el.textContent = total > 99 ? '99+' : total; el.style.display = total > 0 ? 'block' : 'none'; });
  });
  // persist across routes
  window._unreadUnsub = unsub;
}

function showNotificationButtonIfNeeded() {
  const btn = document.getElementById('enable-notifications-btn');
  if (btn && 'Notification' in window && Notification.permission === 'default') btn.style.display = 'block';
}
window.enableNotifications = async function() {
  const btn = document.getElementById('enable-notifications-btn');
  if (!btn) return;
  try {
    const perm = await Notification.requestPermission();
    btn.style.display = 'none';
    if (perm === 'granted') setTimeout(requestFCMToken, 2000);
  } catch(e) { btn.style.display = 'none'; }
};
async function requestFCMToken() {
  try {
    const { getMessaging, getToken } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging.js");
    const registration = await navigator.serviceWorker.register('/firebase-messaging-sw.js');
    const messaging = getMessaging(app);
    const token = await getToken(messaging, { vapidKey, serviceWorkerRegistration: registration });
    if (token) await updateDoc(doc(db,'users',me.uid), { fcmToken: token });
  } catch(e) { console.error('FCM:', e); }
}

function loadChats(autoOpenUid) {
  if (chatsUnsub) chatsUnsub();
  const q = query(collection(db,'chats'), where('members','array-contains',me.uid), orderBy('lastAt','desc'));
  chatsUnsub = onSnapshot(q, async snap => {

    if (!list) return;
    if (snap.empty) { list.innerHTML = `<div class="empty-chats">Нет сообщений.<br>Нажми «+ Новый»</div>`; return; }

    for (const d of snap.docs) {
      const el = await renderChatItem({ id:d.id, ...d.data() });

    list.innerHTML = '';

async function renderChatItem(chat) {
  const otherId = (chat.members || []).find(id => id !== me.uid);
  if (!otherId) return null;
  const other = await getUser(otherId);
  const unread = (chat.unread && chat.unread[me.uid]) || 0;
  const div = document.createElement('div');
  div.className = 'chat-item';
  div.dataset.chatId = chat.id;
  div.innerHTML = `
    <div class="ci-av">${(other.name||'U')[0].toUpperCase()}</div>
    <div class="ci-info">
      <div class="ci-name" style="font-weight:${unread>0?800:700}">${esc(other.name)}</div>

      <div class="ci-time">${chat.lastAt?timeAgo(chat.lastAt.toDate()):''}</div>
      ${unread>0?`<div class="ci-badge">${unread>99?'99+':unread}</div>`:''}
    </div>`;
  div.onclick = () => openChat(chat.id, other, otherId);
  return div;

window.openChat = function(chatId, other, otherId) {
  activeChatId = chatId;
  const empty = document.querySelector('.chat-empty');
  const active = document.getElementById('chat-active');
  if (empty) empty.style.display = 'none';
  if (active) active.style.display = 'flex';
  const avEl = document.getElementById('chat-av');
  const nameEl = document.getElementById('chat-name');
  const handleEl = document.getElementById('chat-handle');
  const onlineDot = document.getElementById('chat-online');
  if (avEl) avEl.textContent = (other.name||'U')[0].toUpperCase();
  if (nameEl) nameEl.textContent = other.name||'Пользователь';
  const originalHandle = '@'+(other.username||'');
  if (handleEl) handleEl.textContent = originalHandle;
  if (onlineDot) onlineDot.style.display = other.isOnline ? 'inline-block' : 'none';
  document.getElementById('chat-window')?.classList.add('open');
  document.querySelectorAll('.chat-item').forEach(el => el.classList.toggle('active', el.dataset.chatId === chatId));
  updateDoc(doc(db,'chats',chatId), { [`unread.${me.uid}`]: 0 }).catch(() => {});

  if (typingUnsub) { typingUnsub(); typingUnsub = null; }
  typingUnsub = onSnapshot(doc(db,'chats',chatId), snap => {
    const data = snap.data();
    const isTyping = data?.typing?.[otherId] && (Date.now()-data.typing[otherId].toDate().getTime()) < 5000;
    if (handleEl) {
      handleEl.textContent = isTyping ? 'Печатает...' : originalHandle;
      handleEl.style.color = isTyping ? '#1D9BF0' : '';
    }
  });

  if (msgsUnsub) msgsUnsub();
  const msgsEl = document.getElementById('chat-messages');
  if (msgsEl) msgsEl.innerHTML = '';
  msgsUnsub = onSnapshot(
    query(collection(db,'chats',chatId,'messages'), orderBy('ts'), limitToLast(50)),
    snap => {
      const el = document.getElementById('chat-messages');
      if (!el) return;
      el.innerHTML = '';
      snap.forEach(d => {
        const m = d.data();
        const isMine = m.uid === me.uid;
        const div = document.createElement('div');
        div.className = 'msg '+(isMine?'mine':'theirs');
        div.innerHTML = `<div class="msg-bubble">${esc(m.text)}</div><div class="msg-time">${fmtTime(m.ts)}</div>`;
        el.appendChild(div);
      });
      el.scrollTop = el.scrollHeight;
    }
  );
};

window.openChatWithUser = async function(targetUid) {
  if (!me || targetUid === me.uid) return;
  const chatId = [me.uid, targetUid].sort().join('_');
  const chatRef = doc(db,'chats',chatId);
  const chatSnap = await getDoc(chatRef);
  if (!chatSnap.exists()) {
    await setDoc(chatRef, { members:[me.uid,targetUid], lastMsg:'', lastAt:serverTimestamp() });
  }
  const other = await getUser(targetUid);
  openChat(chatId, other, targetUid);
};

window.sendMsg = async function() {
  const input = document.getElementById('msg-input');
  const text = input?.value.trim();
  if (!text || !activeChatId) return;
  if (input) { input.value = ''; input.style.height = 'auto'; }
  clearTyping();
  const ref = doc(db,'chats',activeChatId);
  await addDoc(collection(db,'chats',activeChatId,'messages'), { text, uid:me.uid, ts:serverTimestamp() });
  try {
    const chatDoc = await getDoc(ref);
    const otherId = chatDoc.data()?.members?.find(id => id !== me.uid);
    await updateDoc(ref, { lastMsg:text, lastAt:serverTimestamp(), [`unread.${otherId}`]: increment(1) });
    const otherDoc = await getDoc(doc(db,'users',otherId));
    const fcmToken = otherDoc.exists() ? otherDoc.data().fcmToken : null;
    if (fcmToken && myProfile) {
      fetch('/api/send-push', { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ token:fcmToken, title:myProfile.name||'Сообщение', body:text }) }).catch(() => {});
    }
  } catch(e) { console.error('send:', e); }
};

window.handleMsgKey = function(e) { if (e.key==='Enter'&&!e.shiftKey) { e.preventDefault(); clearTyping(); sendMsg(); } else setTyping(); };
window.autoResize = el => { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight,120)+'px'; };
window.closeChatMobile = () => document.getElementById('chat-window')?.classList.remove('open');
window.setTyping = function() {
  if (!activeChatId||!me) return;
  updateDoc(doc(db,'chats',activeChatId), { [`typing.${me.uid}`]: serverTimestamp() }).catch(() => {});
  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(clearTyping, 3000);
};
function clearTyping() {
  if (!activeChatId||!me) return;
  updateDoc(doc(db,'chats',activeChatId), { [`typing.${me.uid}`]: deleteField() }).catch(() => {});
}
window.showNewChat = function() {
  document.getElementById('modal-overlay')?.classList.add('show');
  const ms = document.getElementById('modal-search');
  if (ms) { ms.value = ''; setTimeout(() => ms.focus(), 100); }
  const mr = document.getElementById('modal-results');
  if (mr) mr.innerHTML = '';
};
window.hideNewChat = () => document.getElementById('modal-overlay')?.classList.remove('show');
window.searchForUser = async function(val) {
  const q2 = val.trim().toLowerCase().replace('@','');
  const res = document.getElementById('modal-results');
  if (!res) return;
  res.innerHTML = '';
  if (!q2||q2.length<2) return;
  const snap = await getDocs(query(collection(db,'users'), where('username','>=',q2), where('username','<=',q2+''), limit(5)));
  if (snap.empty) { res.innerHTML = '<div style="padding:10px;font-size:13px;color:#536471">Пользователь не найден</div>'; return; }
  snap.forEach(d => {
    if (d.id===me.uid) return;
    const u = d.data();
    const div = document.createElement('div');
    div.className = 'modal-user';
    div.innerHTML = `<div class="mu-av">${(u.name||'U')[0].toUpperCase()}</div><div><div class="mu-name">${esc(u.name)}</div><div class="mu-handle">@${esc(u.username)}</div></div>`;
    div.onclick = () => { hideNewChat(); openChatWithUser(d.id); };
    res.appendChild(div);
  });
};

window.toggleEdit = () => document.getElementById('edit-form')?.classList.toggle('show');
window.saveProfile = async function() {
  const name = document.getElementById('inp-name')?.value.trim();
  const username = document.getElementById('inp-username')?.value.trim();
  if (!name) { showFormErr('Введи имя'); return; }
  if (!username||username.length<3) { showFormErr('Username минимум 3 символа'); return; }
  const btn = document.getElementById('btn-save');
  if (btn) { btn.disabled=true; btn.textContent='Сохраняем...'; }
  try {
    let existing = {};
    const pd = await getDoc(doc(db,'users',me.uid));
    if (pd.exists()) existing = pd.data();
    await setDoc(doc(db,'users',me.uid), { name, username, email:me.email||'', verified:existing.verified||false, photoURL:existing.photoURL||null, followers:existing.followers||[], following:existing.following||[], updatedAt:new Date() });
    myProfile = { ...existing, name, username };
    userCache.set(me.uid, myProfile);
    updateSidebar();
    if (!existing.name) { go('/'); return; }
    renderProfile();
  } catch(e) { showFormErr('Ошибка: '+e.message); }
  if (btn) { btn.disabled=false; btn.textContent='Сохранить'; }
};
function showFormErr(msg) {
  const el = document.getElementById('err-msg');
  if (!el) return;
  el.textContent=msg; el.style.display='block';
  setTimeout(() => el.style.display='none', 4000);
}
async function loadMyPosts() {
  try {
    const q = query(collection(db,'posts'), where('authorId','==',me.uid), orderBy('createdAt','desc'));
    const snap = await getDocs(q);
    const statEl = document.getElementById('stat-posts');
    if (statEl) statEl.innerHTML = `<b>${snap.size}</b> постов`;
    const list = document.getElementById('posts-list');
    if (!list) return;
    if (snap.empty) { list.innerHTML='<div class="empty">Нет постов — напиши первый!</div>'; return; }
    list.innerHTML='';
    const p = myProfile||{};
    snap.forEach(d => {
      const data = d.data();
      const liked = data.likes?.includes(me?.uid);
      const count = data.likes?.length||0;
      const div = document.createElement('div');
      div.className='post';
      div.innerHTML=`
        <div class="p-av">${(p.name||'U')[0].toUpperCase()}</div>
        <div class="p-body">
          <div class="p-time">${data.createdAt?timeAgo(data.createdAt.toDate()):''}</div>
          <div class="post-text">${esc(data.text)}</div>
          <div class="post-actions">
            <button class="p-action ${liked?'liked':''}" onclick="toggleLike('${d.id}',${liked})"><i class="ti ti-heart"></i>${count>0?count:''}</button>
            <button class="p-action p-del" onclick="deletePost('${d.id}')"><i class="ti ti-trash"></i></button>
          </div>
        </div>`;
      list.appendChild(div);
    });
  } catch(e) { const list=document.getElementById('posts-list'); if(list) list.innerHTML='<div class="empty">Нет постов</div>'; }
}
window.doLogout = async function() {
  if (!confirm('Выйти из аккаунта?')) return;
  if (me) await updateDoc(doc(db,'users',me.uid), { isOnline:false }).catch(() => {});
  await signOut(auth);
};

window.toggleFollow = async function(targetUid, isFollowing) {
  const btn = document.getElementById('btn-follow');
  try {
    if (isFollowing) {
      await updateDoc(doc(db,'users',targetUid), { followers:arrayRemove(me.uid) });
      await updateDoc(doc(db,'users',me.uid), { following:arrayRemove(targetUid) });
      if (btn) { btn.textContent='Подписаться'; btn.className='btn-follow not-following'; btn.setAttribute('onclick',`toggleFollow('${targetUid}',false)`); }
    } else {
      await updateDoc(doc(db,'users',targetUid), { followers:arrayUnion(me.uid) });
      await updateDoc(doc(db,'users',me.uid), { following:arrayUnion(targetUid) });
      if (btn) { btn.textContent='Отписаться'; btn.className='btn-follow following'; btn.setAttribute('onclick',`toggleFollow('${targetUid}',true)`); }
    }
  } catch(e) { console.error(e); }
};
