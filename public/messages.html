<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Costax — Сообщения</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0a;
      color: #fff;
      height: 100vh;
      overflow: hidden;
    }
    .app {
      display: flex;
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
      height: 100vh;
    }
    .sidebar {
      width: 320px;
      background: #111;
      border-right: 1px solid #222;
      display: flex;
      flex-direction: column;
    }
    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid #222;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .sidebar-header h2 { font-size: 22px; font-weight: 700; }
    .new-chat-btn {
      background: #1d9bf0;
      color: white;
      border: none;
      padding: 8px 18px;
      border-radius: 9999px;
      font-weight: 600;
      cursor: pointer;
    }
    .chats-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    .chat-item {
      padding: 14px 16px;
      border-radius: 12px;
      margin-bottom: 4px;
      cursor: pointer;
      display: flex;
      gap: 12px;
      align-items: center;
      transition: background 0.2s;
    }
    .chat-item:hover { background: #1a1a1a; }
    .chat-item.active { background: #1f2a3a; }
    .chat-item .avatar {
      width: 48px; height: 48px;
      background: #1d9bf0;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; flex-shrink: 0;
    }
    .chat-item .info { flex: 1; min-width: 0; }
    .chat-item .name { font-weight: 600; margin-bottom: 2px; }
    .chat-item .last-msg { font-size: 13px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #0a0a0a;
    }
    .chat-header {
      padding: 18px 24px;
      border-bottom: 1px solid #222;
      background: #111;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .chat-header .avatar {
      width: 42px; height: 42px;
      background: #1d9bf0;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700;
    }
    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .message {
      max-width: 65%;
      padding: 12px 18px;
      border-radius: 20px;
      line-height: 1.4;
    }
    .message.mine {
      align-self: flex-end;
      background: #1d9bf0;
      border-bottom-right-radius: 6px;
    }
    .message.theirs {
      align-self: flex-start;
      background: #222;
      border-bottom-left-radius: 6px;
    }
    .msg-time {
      font-size: 11px;
      color: #777;
      margin-top: 4px;
    }
    .input-area {
      padding: 16px 24px;
      background: #111;
      border-top: 1px solid #222;
      display: flex;
      gap: 12px;
    }
    .input-area input {
      flex: 1;
      padding: 14px 20px;
      border-radius: 9999px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: white;
      font-size: 15px;
    }
    .input-area button {
      padding: 14px 28px;
      background: #1d9bf0;
      color: white;
      border: none;
      border-radius: 9999px;
      font-weight: 600;
      cursor: pointer;
    }
    .empty-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #555;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">
        <h2>Сообщения</h2>
        <button class="new-chat-btn" onclick="showNewChat()">+ Новый</button>
      </div>
      <div id="chats-list" class="chats-list"></div>
    </div>

    <!-- Main Chat -->
    <div class="main">
      <div id="chat-header" class="chat-header" style="display: none;">
        <div id="chat-av" class="avatar"></div>
        <div>
          <div id="chat-name" style="font-weight:600;"></div>
          <div id="chat-handle" style="font-size:13px;color:#888;"></div>
        </div>
      </div>

      <div id="chat-messages" class="messages-container" style="display:none;"></div>
      <div id="empty-state" class="empty-state">Выберите чат или начните новый</div>

      <div class="input-area" id="input-area" style="display:none;">
        <input type="text" id="msg-input" placeholder="Напишите сообщение..." onkeypress="if(event.key==='Enter') sendMsg()">
        <button onclick="sendMsg()">Отправить</button>
      </div>
    </div>
  </div>

      }

  </script>
</body>
</html>
