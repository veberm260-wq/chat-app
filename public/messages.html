<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Costax — Сообщения</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, 'Helvetica Neue', sans-serif; background: #0F1117; color: #E8E9EC; height: 100vh; display: flex; overflow: hidden; }

.sidebar { width: 220px; min-width: 220px; background: #0F1117; border-right: 0.5px solid #1E2030; display: flex; flex-direction: column; padding: 24px 14px; gap: 2px; height: 100vh; }
.s-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; padding: 0 10px; }
.s-logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, #6C63FF, #4A90E2); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.s-logo-text { font-size: 18px; font-weight: 700; color: #E8E9EC; letter-spacing: -0.02em; }
.s-item { display: flex; align-items: center; gap: 12px; padding: 11px 12px; border-radius: 10px; font-size: 14px; color: #8B8FA8; cursor: pointer; transition: all 0.15s; text-decoration: none; }
.s-item:hover { background: #1A1D2E; color: #E8E9EC; }
.s-item.active { background: #1A1D2E; color: #E8E9EC; font-weight: 500; }
.s-item i { font-size: 18px; }
.s-divider { height: 0.5px; background: #1E2030; margin: 10px 0; }
.s-bottom { margin-top: auto; }
.s-user { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; cursor: pointer; }
.s-user:hover { background: #1A1D2E; }
.s-av { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg, #6C63FF, #4A90E2); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: white; flex-shrink: 0; }
.s-name { font-size: 13px; color: #E8E9EC; font-weight: 500; }
.s-handle { font-size: 11px; color: #8B8FA8; }

.msgs-wrap { flex: 1; display: flex; overflow: hidden; }

/* Chats list */
.chats-panel { width: 300px; min-width: 300px; background: #0F1117; border-right: 0.5px solid #1E2030; display: flex; flex-direction: column; }
.chats-top { padding: 14px 16px; border-bottom: 0.5px solid #1E2030; display: flex; align-items: center; justify-content: space-between; }
.chats-title { font-size: 15px; font-weight: 600; color: #E8E9EC; }
.btn-new { background: linear-gradient(135deg, #6C63FF, #4A90E2); color: white; border: none; border-radius: 20px; padding: 6px 14px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; }
.search-chat { padding: 10px 14px; border-bottom: 0.5px solid #1E2030; }
.search-chat input { width: 100%; border: none; border-radius: 20px; padding: 8px 14px; font-size: 13px; color: #E8E9EC; background: #1A1D2E; outline: none; font-family: inherit; }
.search-chat input::placeholder { color: #4A4D60; }
.chats-list { flex: 1; overflow-y: auto; }
.chat-item { display: flex; align-items: center; gap: 10px; padding: 13px 16px; cursor: pointer; border-bottom: 0.5px solid #1E2030; transition: background 0.1s; }
.chat-item:hover { background: #13151F; }
.chat-item.active { background: #1A1D2E; }
.ci-av { width: 42px; height: 42px; border-radius: 50%; background: linear-gradient(135deg, #6C63FF, #4A90E2); display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; color: white; flex-shrink: 0; }
.ci-info { flex: 1; overflow: hidden; }
.ci-name { font-size: 13px; font-weight: 500; color: #E8E9EC; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ci-last { font-size: 12px; color: #4A4D60; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
.ci-time { font-size: 11px; color: #4A4D60; flex-shrink: 0; }
.empty-chats { padding: 40px 20px; text-align: center; color: #4A4D60; font-size: 13px; line-height: 1.8; }

/* Chat window */
.chat-window { flex: 1; display: flex; flex-direction: column; background: #0F1117; }
.chat-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #4A4D60; gap: 12px; }
.chat-empty i { font-size: 44px; }
.chat-empty p { font-size: 14px; }

.chat-header { padding: 13px 20px; border-bottom: 0.5px solid #1E2030; background: #0F1117; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.ch-av { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #6C63FF, #4A90E2); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: white; flex-shrink: 0; }
.ch-name { font-size: 14px; font-weight: 600; color: #E8E9EC; }
.ch-handle { font-size: 12px; color: #8B8FA8; }

.chat-messages { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 6px; }
.msg { max-width: 68%; }
.msg.mine { align-self: flex-end; }
.msg.theirs { align-self: flex-start; }
.msg-bubble { padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.5; word-break: break-word; }
.msg.mine .msg-bubble { background: linear-gradient(135deg, #6C63FF, #4A90E2); color: white; border-bottom-right-radius: 4px; }
.msg.theirs .msg-bubble { background: #1A1D2E; color: #E8E9EC; border-bottom-left-radius: 4px; }
.msg-time { font-size: 10px; color: #4A4D60; margin-top: 3px; }
.msg.mine .msg-time { text-align: right; }

.chat-input-wrap { padding: 12px 16px; background: #0F1117; border-top: 0.5px solid #1E2030; display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0; }
.chat-input { flex: 1; border: 0.5px solid #1E2030; border-radius: 20px; padding: 10px 16px; font-size: 14px; color: #E8E9EC; background: #1A1D2E; outline: none; resize: none; font-family: inherit; max-height: 120px; line-height: 1.5; transition: border-color 0.15s; }
.chat-input:focus { border-color: #6C63FF; }
.chat-input::placeholder { color: #4A4D60; }
.btn-send { width: 38px; height: 38px; border-radius: 50%; background: linear-gradient(135deg, #6C63FF, #4A90E2); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity 0.15s; }
.btn-send:hover { opacity: 0.85; }
.btn-send i { font-size: 17px; color: white; }

/* Modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; align-items: center; justify-content: center; }
.modal-overlay.show { display: flex; }
.modal { background: #1A1D2E; border: 0.5px solid #2A2D40; border-radius: 16px; width: 100%; max-width: 360px; padding: 24px; }
.modal h3 { font-size: 16px; font-weight: 600; color: #E8E9EC; margin-bottom: 16px; }
.modal input { width: 100%; border: 0.5px solid #2A2D40; border-radius: 10px; padding: 10px 13px; font-size: 14px; color: #E8E9EC; background: #0F1117; outline: none; font-family: inherit; margin-bottom: 12px; }
.modal input:focus { border-color: #6C63FF; }
.modal input::placeholder { color: #4A4D60; }
.modal-results { max-height: 200px; overflow-y: auto; }
.modal-user { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 8px; cursor: pointer; }
.modal-user:hover { background: #232640; }
.mu-av { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #6C63FF, #4A90E2); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: white; flex-shrink: 0; }
.mu-name { font-size: 13px; font-weight: 500; color: #E8E9EC; }
.mu-handle { font-size: 12px; color: #8B8FA8; }
.modal-close { width: 100%; background: transparent; border: 0.5px solid #2A2D40; border-radius: 10px; padding: 10px; font-size: 13px; color: #8B8FA8; cursor: pointer; font-family: inherit; margin-top: 8px; }
.modal-close:hover { border-color: #8B8FA8; color: #E8E9EC; }

/* Mobile */
.mob-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: #0F1117; border-top: 0.5px solid #1E2030; z-index: 100; padding: 8px 0 max(8px, env(safe-area-inset-bottom)); }
.mob-nav-inner { display: flex; justify-content: space-around; }
.mob-item { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 4px 16px; color: #4A4D60; text-decoration: none; font-size: 10px; }
.mob-item.active { color: #6C63FF; }
.mob-item i { font-size: 22px; }
.back-btn { display: none; background: none; border: none; color: #6C63FF; cursor: pointer; font-size: 20px; margin-right: 4px; padding: 0; }

@media (max-width: 640px) {
  .sidebar { display: none; }
  .mob-nav { display: block; }
  .chats-panel { width: 100%; min-width: unset; border-right: none; }
  .chat-window { display: none; position: fixed; inset: 0; z-index: 50; padding-bottom: 60px; }
  .chat-window.open { display: flex; flex-direction: column; }
  .back-btn { display: flex !important; }
  .msgs-wrap { padding-bottom: 60px; }
}
</style>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body>

<div class="sidebar">
  <div class="s-logo">
    <div class="s-logo-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    </div>
    <div class="s-logo-text">Costax</div>
  </div>
  <a class="s-item" href="/"><i class="ti ti-home"></i>Главная</a>
  <a class="s-item active" href="/messages.html"><i class="ti ti-message"></i>Сообщения</a>
  <a class="s-item" href="/profile.html"><i class="ti ti-user"></i>Профиль</a>
  <div class="s-divider"></div>
  <div class="s-bottom">
    <div class="s-user">
      <div class="s-av" id="sidebar-av">М</div>
      <div>
        <div class="s-name" id="sidebar-name">...</div>
        <div class="s-handle" id="sidebar-handle">@...</div>
      </div>
    </div>
  </div>
</div>

<div class="msgs-wrap">
  <div class="chats-panel">
    <div class="chats-top">
      <div class="chats-title">Сообщения</div>
      <button class="btn-new" onclick="showNewChat()">+ Новый</button>
    </div>
    <div class="search-chat">
      <input type="text" placeholder="Поиск..." id="search-chats">
    </div>
    <div class="chats-list" id="chats-list">
      <div class="empty-chats">Нет сообщений.<br>Нажми «+ Новый» чтобы написать кому-то.</div>
    </div>
  </div>

  <div class="chat-window" id="chat-window">
    <div class="chat-empty" id="chat-empty">
      <i class="ti ti-message-2"></i>
      <p>Выбери чат или начни новый</p>
    </div>
    <div id="chat-active" style="display:none;flex:1;flex-direction:column;overflow:hidden;">
      <div class="chat-header">
        <button class="back-btn" onclick="closeChatMobile()"><i class="ti ti-arrow-left"></i></button>
        <div class="ch-av" id="chat-av">А</div>
        <div>
          <div class="ch-name" id="chat-name">Имя</div>
          <div class="ch-handle" id="chat-handle">@username</div>
        </div>
      </div>
      <div class="chat-messages" id="chat-messages"></div>
      <div class="chat-input-wrap">
        <textarea class="chat-input" id="msg-input" placeholder="Сообщение..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="btn-send" onclick="sendMsg()"><i class="ti ti-send"></i></button>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="hideNewChat()">
  <div class="modal" onclick="event.stopPropagation()">
    <h3>Новое сообщение</h3>
    <input type="text" id="modal-search" placeholder="Найти по @username" oninput="searchForUser(this.value)">
    <div class="modal-results" id="modal-results"></div>
    <button class="modal-close" onclick="hideNewChat()">Отмена</button>
  </div>
</div>

<nav class="mob-nav">
  <div class="mob-nav-inner">
    <a class="mob-item" href="/"><i class="ti ti-home"></i>Лента</a>
    <a class="mob-item active" href="/messages.html"><i class="ti ti-message"></i>Чаты</a>
    <a class="mob-item" href="/profile.html"><i class="ti ti-user"></i>Профиль</a>
  </div>
</nav>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, orderBy, query, doc, getDoc, setDoc, getDocs, serverTimestamp, where, limit } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCeveXncaJYszckdflfTVWCDc0AwNilR9k",
  authDomain: "costax-aed53.firebaseapp.com",
  projectId: "costax-aed53",
  storageBucket: "costax-aed53.firebasestorage.app",
  messagingSenderId: "747179946604",
  appId: "1:747179946604:web:073d7faf7d80fb40041e49"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let me = null, myProfile = null, activeChatId = null, msgUnsub = null;

onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.href = '/login'; return; }
  me = user;
  const pd = await getDoc(doc(db, 'users', user.uid));
  if (!pd.exists()) { window.location.href = '/profile.html?setup=1'; return; }
  myProfile = pd.data();
  document.getElementById('sidebar-av').textContent = (myProfile.name||'U')[0].toUpperCase();
  document.getElementById('sidebar-name').textContent = myProfile.name||'';
  document.getElementById('sidebar-handle').textContent = '@'+(myProfile.username||'');
  loadChats();
  requestNotifications();
  const uid = new URLSearchParams(window.location.search).get('uid');
  if (uid) openChatWithUser(uid);
});

function getChatId(a, b) { return [a,b].sort().join('_'); }

function loadChats() {
  const q = query(collection(db,'chats'), where('members','array-contains',me.uid));
  onSnapshot(q, async snap => {
    const list = document.getElementById('chats-list');
    if (snap.empty) { list.innerHTML = '<div class="empty-chats">Нет сообщений.<br>Нажми «+ Новый» чтобы написать кому-то.</div>'; return; }
    list.innerHTML = '';
    for (const d of snap.docs) {
      const chat = { id: d.id, ...d.data() };
      list.appendChild(await renderChatItem(chat));
    }
  });
}

async function renderChatItem(chat) {
  const otherId = chat.members.find(id => id !== me.uid);
  const od = await getDoc(doc(db,'users',otherId));
  const other = od.exists() ? od.data() : { name:'Пользователь', username:'user' };
  const div = document.createElement('div');
  div.className = 'chat-item' + (chat.id === activeChatId ? ' active' : '');
  div.dataset.chatId = chat.id;
  div.innerHTML = `
    <div class="ci-av">${(other.name||'U')[0].toUpperCase()}</div>
    <div class="ci-info">
      <div class="ci-name">${esc(other.name)}</div>
      <div class="ci-last">${esc(chat.lastMsg||'Начни переписку')}</div>
    </div>
    <div class="ci-time">${chat.lastAt ? timeAgo(chat.lastAt.toDate()) : ''}</div>`;
  div.onclick = () => openChat(chat.id, other);
  return div;
}

window.openChat = function(chatId, other) {
  activeChatId = chatId;
  document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
  document.querySelector(`[data-chat-id="${chatId}"]`)?.classList.add('active');
  document.getElementById('chat-av').textContent = (other.name||'U')[0].toUpperCase();
  document.getElementById('chat-name').textContent = other.name||'Пользователь';
  document.getElementById('chat-handle').textContent = '@'+(other.username||'user');
  document.getElementById('chat-empty').style.display = 'none';
  document.getElementById('chat-active').style.display = 'flex';
  document.getElementById('chat-window').classList.add('open');
  if (msgUnsub) msgUnsub();
  const q = query(collection(db,'chats',chatId,'messages'), orderBy('createdAt','asc'));
  msgUnsub = onSnapshot(q, snap => {
    const c = document.getElementById('chat-messages');
    c.innerHTML = '';
    snap.forEach(d => {
      const msg = d.data();
      const div = document.createElement('div');
      div.className = 'msg ' + (msg.senderId === me.uid ? 'mine' : 'theirs');
      div.innerHTML = `<div class="msg-bubble">${esc(msg.text)}</div><div class="msg-time">${msg.createdAt ? timeAgo(msg.createdAt.toDate()) : ''}</div>`;
      c.appendChild(div);
    });
    c.scrollTop = c.scrollHeight;
    // Пуш если сообщение не от меня
    snap.docChanges().forEach(change => {
      if (change.type === 'added') {
        const msg = change.doc.data();
        if (msg.senderId !== me.uid && msg.createdAt) {
          const name = document.getElementById('chat-name').textContent;
          showPushNotification(name, msg.text);
        }
      }
    });
  });
};

window.openChatWithUser = async function(uid) {
  const chatId = getChatId(me.uid, uid);
  const od = await getDoc(doc(db,'users',uid));
  if (!od.exists()) return;
  const other = od.data();
  const chatRef = doc(db,'chats',chatId);
  const cd = await getDoc(chatRef);
  if (!cd.exists()) await setDoc(chatRef, { members:[me.uid,uid], lastMsg:'', lastAt:serverTimestamp() });
  openChat(chatId, other);
};

window.sendMsg = async function() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text || !activeChatId) return;
  input.value = '';
  input.style.height = 'auto';
  await addDoc(collection(db,'chats',activeChatId,'messages'), { text, senderId:me.uid, senderName:myProfile.name, createdAt:serverTimestamp() });
  await setDoc(doc(db,'chats',activeChatId), { lastMsg:text, lastAt:serverTimestamp() }, { merge:true });
};

window.showNewChat = function() {
  document.getElementById('modal-overlay').classList.add('show');
  setTimeout(() => document.getElementById('modal-search').focus(), 100);
};

window.hideNewChat = function() {
  document.getElementById('modal-overlay').classList.remove('show');
  document.getElementById('modal-search').value = '';
  document.getElementById('modal-results').innerHTML = '';
};

window.searchForUser = async function(val) {
  const results = document.getElementById('modal-results');
  if (!val.trim()) { results.innerHTML = ''; return; }
  const q = query(collection(db,'users'), where('username','>=',val.toLowerCase()), where('username','<=',val.toLowerCase()+'\uf8ff'), limit(10));
  const snap = await getDocs(q);
  results.innerHTML = '';
  snap.forEach(d => {
    if (d.id === me.uid) return;
    const u = d.data();
    const div = document.createElement('div');
    div.className = 'modal-user';
    div.innerHTML = `<div class="mu-av">${(u.name||'U')[0].toUpperCase()}</div><div><div class="mu-name">${esc(u.name)}</div><div class="mu-handle">@${esc(u.username)}</div></div>`;
    div.onclick = () => { hideNewChat(); openChatWithUser(d.id); };
    results.appendChild(div);
  });
  if (snap.empty) results.innerHTML = '<div style="padding:12px;text-align:center;color:#4A4D60;font-size:13px">Никого не нашли</div>';
};

window.closeChatMobile = () => document.getElementById('chat-window').classList.remove('open');
window.handleKey = e => { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); } };
window.autoResize = el => { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; };


// Запрос разрешения на уведомления
async function requestNotifications() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'default') {
    await Notification.requestPermission();
  }
}

function showPushNotification(title, body) {
  if (Notification.permission !== 'granted') return;
  if (document.visibilityState === 'visible') return; // не показывать если сайт активен
  new Notification(title, {
    body: body,
    icon: '/favicon.ico',
    badge: '/favicon.ico'
  });
}

function timeAgo(d) {
  const s = Math.floor((Date.now()-d)/1000);
  if (s<60) return 'только что';
  if (s<3600) return Math.floor(s/60)+' мин';
  if (s<86400) return Math.floor(s/3600)+' ч';
  return Math.floor(s/86400)+' д';
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
