<script>
function initStars() {
  const canvas = document.getElementById('stars-canvas');
  const ctx = canvas.getContext('2d');
  let stars = [];
  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  function createStars() {
    stars = [];
    for (let i = 0; i < 200; i++) {
      stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*1.2+0.2, speed: 0.003+Math.random()*0.008, phase: Math.random()*Math.PI*2 });
    }
  }
  function draw(t) {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    stars.forEach(s => {
      const a = 0.15 + 0.65*(0.5+0.5*Math.sin(t*s.speed+s.phase));
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle = `rgba(255,255,255,${a})`; ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  resize(); createStars();
  window.addEventListener('resize', () => { resize(); createStars(); });
  requestAnimationFrame(draw);
}
initStars();

let isDark = false;
function toggleTheme() {
  isDark = !isDark;
  document.body.className = isDark ? 'dark' : 'light';
  document.getElementById('theme-icon').className = isDark ? 'ti ti-sun' : 'ti ti-moon';
  document.getElementById('theme-label').textContent = isDark ? 'Светлая тема' : 'Тёмная тема';
  document.getElementById('toggle-pill').style.background = isDark ? '#1D9BF0' : '#E7E9EA';
  document.getElementById('toggle-dot').style.left = isDark ? '20px' : '2px';
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
}
if (localStorage.getItem('theme') === 'dark') toggleTheme();
</script>

function timeAgo(d) {
  if (!d) return '';
  const s = Math.floor((Date.now() - d)/1000);
  if (s < 60) return 'только что';
  if (s < 3600) return Math.floor(s/60)+' мин';
  if (s < 86400) return Math.floor(s/3600)+' ч';
  return Math.floor(s/86400)+' д';
}

function fmtTime(ts) {
  if (!ts) return '';
  return new Date(ts.toDate()).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
}

function getDefaultAvatar(gender) {
  const color = '#1D9BF0';
  if (gender === 'male') {
    return `<svg viewBox="0 0 24 24" width="100%" height="100%" fill="${color}"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>`;
  } else if (gender === 'female') {
    return `<svg viewBox="0 0 24 24" width="100%" height="100%" fill="${color}"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/><circle cx="12" cy="6" r="1.5"/></svg>`;
  } else {
    return `<svg viewBox="0 0 24 24" width="100%" height="100%" fill="${color}"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>`;
  }
}

auth.onAuthStateChanged((user) => {
  if (user) {
    me = user;
    init();
  } else {
    window.location.href = '/login.html';
  }
});

async function init() {
  const pd = await db.collection('users').doc(me.uid).get();

  if (!pd.exists) {
    window.location.href = '/profile.html?setup=1';
    return;
  }

  myProfile = pd.data();

  const sidebarAv = document.getElementById('sidebar-av');
  sidebarAv.innerHTML = getDefaultAvatar(myProfile.gender);
  document.getElementById('sidebar-name').textContent = myProfile.name || '';
  document.getElementById('sidebar-handle').textContent = '@' + (myProfile.username || '');

  loadChats();

  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }

  db.collection('users').doc(me.uid).update({ isOnline: true }).catch(console.error);
}

window.addEventListener('beforeunload', () => {
  if (me) {
    db.collection('users').doc(me.uid).update({ isOnline: false }).catch(() => {});
  }
});

let chatsUnsubscribe = null;

function loadChats() {
  if (chatsUnsubscribe) {
    chatsUnsubscribe();
    chatsUnsubscribe = null;
  }

  const q = db.collection('chats')
    .where('members', 'array-contains', me.uid)
    .orderBy('lastAt', 'desc');

  chatsUnsubscribe = q.onSnapshot(async (snap) => {
    const list = document.getElementById('chats-list');

    if (snap.empty) {
      list.innerHTML = `<div class="empty-chats">Нет сообщений.<br>Нажми «+ Новый» чтобы написать.</div>`;
      return;
    }

    const chatMap = new Map();

    for (const doc of snap.docs) {
      const chatData = { id: doc.id, ...doc.data() };
      const el = await renderChatItem(chatData);
      chatMap.set(doc.id, el);
    }

    list.innerHTML = '';
    chatMap.forEach(el => list.appendChild(el));
  }, (error) => {
    console.error('Chats error:', error);
  });
}

async function renderChatItem(chat) {
  const otherId = chat.members.find(id => id !== me.uid);
  const od = await db.collection('users').doc(otherId).get();
  const other = od.exists ? od.data() : { name: 'Пользователь', username: '' };
  const div = document.createElement('div');
  div.className = 'chat-item';
  div.dataset.chatId = chat.id;
  
  const unreadHTML = chat.unreadCount > 0 
    ? `<div style="width:8px;height:8px;background:#1D9BF0;border-radius:50%;margin-left:6px;flex-shrink:0;"></div>` 
    : '';

  const avatarHTML = `<div class="ci-av">${getDefaultAvatar(other.gender)}</div>`;
  div.innerHTML = `
    ${avatarHTML}
    <div class="ci-info">
      <div class="ci-name">${esc(other.name)}</div>
      <div class="ci-last">${esc(chat.lastMsg || 'Начни переписку')}</div>
    </div>
    <div style="display:flex;align-items:center;gap:6px;">
      <div class="ci-time">${chat.lastAt ? timeAgo(chat.lastAt.toDate()) : ''}</div>
      ${unreadHTML}
    </div>
  `;
  div.onclick = () => openChat(chat.id, other);
  return div;
}

window.openChat = function(chatId, other) {
  activeChatId = chatId;

  document.getElementById('chat-empty').style.display = 'none';
  const chatActive = document.getElementById('chat-active');
  chatActive.style.display = 'flex';

  document.getElementById('chat-av').innerHTML = getDefaultAvatar(other.gender);
  document.getElementById('chat-name').textContent = other.name || 'Пользователь';
  document.getElementById('chat-handle').textContent = '@' + (other.username || '');

  const onlineDot = document.getElementById('chat-online');
  if (onlineDot) {
    onlineDot.style.display = other.isOnline ? 'inline-block' : 'none';
  }

  document.getElementById('chat-window').classList.add('open');

  document.querySelectorAll('.chat-item').forEach(el => {
    el.classList.toggle('active', el.dataset.chatId === chatId);
  });

  if (msgsUnsubscribe) msgsUnsubscribe();

  const msgsEl = document.getElementById('chat-messages');
  msgsEl.innerHTML = '';

  msgsUnsubscribe = db.collection('chats').doc(chatId)
    .collection('messages')
    .orderBy('ts')
    .limitToLast(50)
    .onSnapshot(snap => {
      msgsEl.innerHTML = '';
      snap.forEach(doc => {
        const m = doc.data();
        const isMine = m.uid === me.uid;
        const div = document.createElement('div');
        div.className = 'msg ' + (isMine ? 'mine' : 'theirs');
        div.innerHTML = `
          <div class="msg-bubble">${esc(m.text)}</div>
          <div class="msg-time">${fmtTime(m.ts)}</div>
        `;
        msgsEl.appendChild(div);
      });
      msgsEl.scrollTop = msgsEl.scrollHeight;

      if (!document.hidden && Notification.permission === 'granted') {
        const lastMsg = snap.docs[snap.docs.length - 1]?.data();
        if (lastMsg && lastMsg.uid !== me.uid) {
          new Notification('Новое сообщение', {
            body: lastMsg.text,
            icon: '/icon-192.png'
          });
        }
      }
    });
};

window.sendMsg = async function() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text || !activeChatId) return;
  input.value = '';
  input.style.height = 'auto';

  const ref = db.collection('chats').doc(activeChatId);
  await ref.collection('messages').add({
    text,
    uid: me.uid,
    ts: firebase.firestore.FieldValue.serverTimestamp()
  });
  await ref.update({
    lastMsg: text,
    lastAt: firebase.firestore.FieldValue.serverTimestamp()
  });
};

window.handleKey = function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMsg();
  }
};

window.autoResize = function(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
};

window.closeChatMobile = function() {
  document.getElementById('chat-window').classList.remove('open');
};

window.showNewChat = function() {
  document.getElementById('modal-overlay').classList.add('show');
  document.getElementById('modal-search').value = '';
  document.getElementById('modal-results').innerHTML = '';
  setTimeout(() => document.getElementById('modal-search').focus(), 100);
};

window.hideNewChat = function() {
  document.getElementById('modal-overlay').classList.remove('show');
};

window.searchForUser = async function(val) {
  const q = val.trim().toLowerCase().replace('@', '');
  const res = document.getElementById('modal-results');
  res.innerHTML = '';
  if (!q || q.length < 2) return;
  const snap = await db.collection('users').where('username', '>=', q).where('username', '<=', q + '\uf8ff').limit(5).get();
  if (snap.empty) {
    res.innerHTML = '<div style="padding:10px;font-size:13px;color:#536471;">Пользователь не найден</div>';
    return;
  }
  snap.forEach(doc => {
    if (doc.id === me.uid) return;
    const u = doc.data();
    const div = document.createElement('div');
    div.className = 'modal-user';
    div.innerHTML = `
      <div class="mu-av">${(u.name||'U')[0].toUpperCase()}</div>
      <div>
        <div class="mu-name">${esc(u.name)}</div>
        <div class="mu-handle">@${esc(u.username)}</div>
      </div>
    `;
    div.onclick = () => { hideNewChat(); openChatWithUser(doc.id); };
    res.appendChild(div);
  });
};

window.openChatWithUser = async function(targetUid) {
  if (!me || targetUid === me.uid) return;
  const chatId = [me.uid, targetUid].sort().join('_');
  const chatRef = db.collection('chats').doc(chatId);
  const chatSnap = await chatRef.get();
  if (!chatSnap.exists) {
    await chatRef.set({
      members: [me.uid, targetUid],
      lastMsg: '',
      lastAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  }
  const otherSnap = await db.collection('users').doc(targetUid).get();
  const other = otherSnap.exists ? otherSnap.data() : { name: 'Пользователь', username: '' };
  openChat(chatId, other);
};
</script>

async function requestNotificationPermission() {
  try {
    const permission = await Notification.requestPermission();
    if (permission !== 'granted') {
      console.log('Уведомления отклонены');
      return null;
    }

    const messaging = firebase.messaging();
    const token = await messaging.getToken({ vapidKey });

    if (token) {
      const user = firebase.auth().currentUser;
      if (user) {
        await firebase.firestore()
          .collection('users')
          .doc(user.uid)
          .set({ fcmToken: token }, { merge: true });
        console.log('FCM Token сохранён:', token);
      }
      return token;
    }
  } catch (error) {
    console.error('Ошибка при получении FCM токена:', error);
  }
  return null;
}

auth.onAuthStateChanged((user) => {
  if (user) {
    setTimeout(() => {
      requestNotificationPermission();
    }, 2000);
  }
});
