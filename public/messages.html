<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Costax — Сообщения</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0a;
      color: #fff;
      height: 100vh;
      overflow: hidden;
    }
    .app {
      display: flex;
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
      height: 100vh;
    }
    .sidebar {
      width: 320px;
      background: #111;
      border-right: 1px solid #222;
      display: flex;
      flex-direction: column;
    }
    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid #222;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .sidebar-header h2 { font-size: 22px; font-weight: 700; }
    .new-chat-btn {
      background: #1d9bf0;
      color: white;
      border: none;
      padding: 8px 18px;
      border-radius: 9999px;
      font-weight: 600;
      cursor: pointer;
    }
    .chats-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    .chat-item {
      padding: 14px 16px;
      border-radius: 12px;
      margin-bottom: 4px;
      cursor: pointer;
      display: flex;
      gap: 12px;
      align-items: center;
      transition: background 0.2s;
    }
    .chat-item:hover { background: #1a1a1a; }
    .chat-item.active { background: #1f2a3a; }
    .chat-item .avatar {
      width: 48px; height: 48px;
      background: #1d9bf0;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; flex-shrink: 0;
    }
    .chat-item .info { flex: 1; min-width: 0; }
    .chat-item .name { font-weight: 600; margin-bottom: 2px; }
    .chat-item .last-msg { font-size: 13px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #0a0a0a;
    }
    .chat-header {
      padding: 18px 24px;
      border-bottom: 1px solid #222;
      background: #111;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .chat-header .avatar {
      width: 42px; height: 42px;
      background: #1d9bf0;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700;
    }
    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .message {
      max-width: 65%;
      padding: 12px 18px;
      border-radius: 20px;
      line-height: 1.4;
    }
    .message.mine {
      align-self: flex-end;
      background: #1d9bf0;
      border-bottom-right-radius: 6px;
    }
    .message.theirs {
      align-self: flex-start;
      background: #222;
      border-bottom-left-radius: 6px;
    }
    .msg-time {
      font-size: 11px;
      color: #777;
      margin-top: 4px;
    }
    .input-area {
      padding: 16px 24px;
      background: #111;
      border-top: 1px solid #222;
      display: flex;
      gap: 12px;
    }
    .input-area input {
      flex: 1;
      padding: 14px 20px;
      border-radius: 9999px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: white;
      font-size: 15px;
    }
    .input-area button {
      padding: 14px 28px;
      background: #1d9bf0;
      color: white;
      border: none;
      border-radius: 9999px;
      font-weight: 600;
      cursor: pointer;
    }
    .empty-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #555;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">
        <h2>Сообщения</h2>
        <button class="new-chat-btn" onclick="showNewChat()">+ Новый</button>
      </div>
      <div id="chats-list" class="chats-list"></div>
    </div>

    <!-- Main Chat -->
    <div class="main">
      <div id="chat-header" class="chat-header" style="display: none;">
        <div id="chat-av" class="avatar"></div>
        <div>
          <div id="chat-name" style="font-weight:600;"></div>
          <div id="chat-handle" style="font-size:13px;color:#888;"></div>
        </div>
      </div>

      <div id="chat-messages" class="messages-container" style="display:none;"></div>
      <div id="empty-state" class="empty-state">Выберите чат или начните новый</div>

      <div class="input-area" id="input-area" style="display:none;">
        <input type="text" id="msg-input" placeholder="Напишите сообщение..." onkeypress="if(event.key==='Enter') sendMsg()">
        <button onclick="sendMsg()">Отправить</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { 
      getFirestore, collection, addDoc, onSnapshot, orderBy, query, 
      doc, getDoc, setDoc, getDocs, serverTimestamp, where, limit 
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSy...lR9k",
      authDomain: "costax-aed53.firebaseapp.com",
      projectId: "costax-aed53",
      storageBucket: "costax-aed53.firebasestorage.app",
      messagingSenderId: "747179946604",
      appId: "1:747179946604:web:073d7faf7d80fb40041e49"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let me = null, myProfile = null, activeChatId = null, msgUnsub = null;

    // Показываем loader пока идёт проверка авторизации
    const showLoader = () => {
      const loader = document.createElement('div');
      loader.id = 'auth-loader';
      loader.style.cssText = 'position:fixed;inset:0;background:#0a0a0a;display:flex;align-items:center;justify-content:center;z-index:9999;font-size:15px;color:#888';
      loader.innerHTML = 'Загрузка...';
      document.body.appendChild(loader);
    };

    const hideLoader = () => {
      document.getElementById('auth-loader')?.remove();
    };

    // Устанавливаем persistence (сессия сохраняется между перезагрузками)
    import { setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    setPersistence(auth, browserLocalPersistence).catch(() => {});

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        // Небольшая задержка, чтобы избежать мгновенного редиректа при медленной инициализации
        setTimeout(() => {
          if (!auth.currentUser) {
            window.location.href = '/login';
          }
        }, 800);
        return;
      }

      me = user;

      const pd = await getDoc(doc(db, 'users', user.uid));
      if (!pd.exists()) {
        window.location.href = '/profile.html?setup=1';
        return;
      }

      myProfile = pd.data();
      hideLoader();
      loadChats();

      const uid = new URLSearchParams(window.location.search).get('uid');
      if (uid) openChatWithUser(uid);
    });

    // Показываем loader при загрузке страницы
    showLoader();

    function getChatId(a, b) {
      return [a, b].sort().join('_');
    }

    function loadChats() {
      const q = query(collection(db, 'chats'), where('members', 'array-contains', me.uid));
      onSnapshot(q, async (snap) => {
        const list = document.getElementById('chats-list');
        if (snap.empty) {
          list.innerHTML = '<div style="padding:20px;color:#666;">Нет сообщений.<br>Нажми «+ Новый» чтобы написать.</div>';
          return;
        }
        list.innerHTML = '';
        const items = [];
        for (const d of snap.docs) {
          const chat = { id: d.id, ...d.data() };
          items.push({ chat, el: await renderChatItem(chat) });
        }
        items.sort((a, b) => (b.chat.lastAt?.seconds || 0) - (a.chat.lastAt?.seconds || 0));
        items.forEach(i => list.appendChild(i.el));
      });
    }

    async function renderChatItem(chat) {
      const otherId = chat.members.find(id => id !== me.uid);
      const od = await getDoc(doc(db, 'users', otherId));
      const other = od.exists() ? od.data() : { name: 'Пользователь', username: 'user' };

      const div = document.createElement('div');
      div.className = 'chat-item' + (chat.id === activeChatId ? ' active' : '');
      div.dataset.chatId = chat.id;

      div.innerHTML = `
        <div class="avatar">${(other.name || 'U')[0].toUpperCase()}</div>
        <div class="info">
          <div class="name">${esc(other.name)}</div>
          <div class="last-msg">${esc(chat.lastMsg || 'Начни переписку')}</div>
        </div>
      `;
      div.onclick = () => openChat(chat.id, other);
      return div;
    }

    window.openChat = function(chatId, other) {
      activeChatId = chatId;
      document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
      document.querySelector(`[data-chat-id="${chatId}"]`)?.classList.add('active');

      document.getElementById('chat-av').textContent = (other.name || 'U')[0].toUpperCase();
      document.getElementById('chat-name').textContent = other.name || 'Пользователь';
      document.getElementById('chat-handle').textContent = '@' + (other.username || 'user');

      document.getElementById('empty-state').style.display = 'none';
      document.getElementById('chat-header').style.display = 'flex';
      document.getElementById('chat-messages').style.display = 'flex';
      document.getElementById('input-area').style.display = 'flex';

      if (msgUnsub) msgUnsub();

      const q = query(collection(db, 'chats', chatId, 'messages'), orderBy('createdAt', 'asc'));
      msgUnsub = onSnapshot(q, (snap) => {
        const container = document.getElementById('chat-messages');
        container.innerHTML = '';
        snap.forEach(d => {
          const msg = d.data();
          const div = document.createElement('div');
          div.className = 'message ' + (msg.senderId === me.uid ? 'mine' : 'theirs');
          div.innerHTML = `
            <div>${esc(msg.text)}</div>
            <div class="msg-time">${msg.createdAt ? timeAgo(msg.createdAt.toDate()) : ''}</div>
          `;
          container.appendChild(div);
        });
        container.scrollTop = container.scrollHeight;
      });
    };

    window.openChatWithUser = async function(uid) {
      const chatId = getChatId(me.uid, uid);
      const od = await getDoc(doc(db, 'users', uid));
      if (!od.exists()) return;

      const other = od.data();
      const chatRef = doc(db, 'chats', chatId);
      const cd = await getDoc(chatRef);
      if (!cd.exists()) {
        await setDoc(chatRef, { members: [me.uid, uid], lastMsg: '', lastAt: serverTimestamp() });
      }
      openChat(chatId, other);
    };

    window.sendMsg = async function() {
      const input = document.getElementById('msg-input');
      const text = input.value.trim();
      if (!text || !activeChatId) return;

      input.value = '';
      await addDoc(collection(db, 'chats', activeChatId, 'messages'), {
        text,
        senderId: me.uid,
        senderName: myProfile.name,
        createdAt: serverTimestamp()
      });
      await setDoc(doc(db, 'chats', activeChatId), { lastMsg: text, lastAt: serverTimestamp() }, { merge: true });
    };

    window.showNewChat = function() {
      const modal = document.createElement('div');
      modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:1000';
      modal.innerHTML = `
        <div style="background:#1a1a1a;padding:24px;border-radius:16px;width:340px;">
          <h3 style="margin-bottom:16px;">Новый чат</h3>
          <input type="text" id="search-input" placeholder="Поиск пользователя" style="width:100%;padding:12px;border-radius:10px;border:1px solid #333;background:#111;color:white;margin-bottom:12px;">
          <div id="search-results"></div>
        </div>
      `;
      document.body.appendChild(modal);

      const input = modal.querySelector('#search-input');
      const results = modal.querySelector('#search-results');

      input.oninput = async () => {
        const val = input.value.trim();
        if (!val) { results.innerHTML = ''; return; }
        const q = query(collection(db, 'users'), where('username', '>=', val.toLowerCase()), where('username', '<=', val.toLowerCase() + ''), limit(8));
        const snap = await getDocs(q);
        results.innerHTML = '';
        snap.forEach(d => {
          if (d.id === me.uid) return;
          const u = d.data();
          const div = document.createElement('div');
          div.style.cssText = 'padding:10px;cursor:pointer;border-radius:8px;';
          div.innerHTML = `<strong>${esc(u.name)}</strong> <span style="color:#888">@${esc(u.username)}</span>`;
          div.onclick = () => {
            modal.remove();
            openChatWithUser(d.id);
          };
          results.appendChild(div);
        });
      };
    };

    function timeAgo(date) {
      const seconds = Math.floor((Date.now() - date) / 1000);
      if (seconds < 60) return 'только что';
      if (seconds < 3600) return Math.floor(seconds / 60) + ' мин';
      if (seconds < 86400) return Math.floor(seconds / 3600) + ' ч';
      return Math.floor(seconds / 86400) + ' д';
    }

    function esc(str) {
      return String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
  </script>
</body>
</html>
